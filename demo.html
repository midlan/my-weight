<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scale Icon — JS Demo</title>
<style>
  body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #eee; padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; margin: 0; }
  #icon { width: 300px; height: 300px; }
  input { font-size: 1.2rem; padding: 8px 12px; width: 120px; text-align: center; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
  button { padding: 8px 16px; cursor: pointer; }
  h1 { margin: 0; font-size: 1.5rem; }
</style>
</head>
<body>
<h1>Scale Icon — JS Control Demo</h1>
<svg id="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Reusable LCD segment: hexagon with half-length 22, half-thickness 7 (gap g=3 applied).
         Tips at (±22, 0), angled corners at (±15, ±7). 45° angle preserved. -->
    <symbol id="seg" overflow="visible">
      <polygon fill="#1DB954" points="-22,0 -15,-7 15,-7 22,0 15,7 -15,7"/>
    </symbol>
    
    <!-- ============ STYLES ============
         All segments and decimal points are hidden by default (display:none).
         Add .on class via JS to light up a specific segment.
         The .default-72-5 class on root lights up the "72.5" display by default.
         
         Segment IDs follow the pattern: seg-{position}-{letter}
           position: 0=hundreds (often blank), 1, 2, 3
           letter:   a,b,c,d,e,f,g (standard 7-segment naming)
                       _a_
                      f| g |b
                       |___|
                      e|   |c
                       |_d_|
         Decimal points: dp-after-{position} (1, 2 are common positions)
    -->
    <style>
      .seg, .dp { display: none; }
      .seg.on, .dp.on { display: inline; }
    </style>
  </defs>
  
  <!-- Green rounded square IS the scale body -->
  <rect width="512" height="512" rx="80" fill="#1DB954"/>
  
  <!-- ============ DISPLAY ============ -->
  <rect x="79" y="53" width="354" height="154" rx="22" fill="#ffffff"/>
  
  <!-- ============ ALL SEGMENTS (hidden by default, lit via .on class) ============
       Digit layout (x0 = top-left of each digit box, all digits 60w × 110h, y0=75):
         Position 0 (hundreds): x0=89
         Position 1:            x0=169
         Position 2:            x0=249
         Position 3:            x0=333
       
       Segment centers within each digit (offsets from x0, y0):
         a: (30, 5)   b: (55, 30)   c: (55, 80)
         d: (30, 105) e: (5, 80)    f: (5, 30)
         g: (30, 55)
       Verticals (b, c, e, f) rotated 90°. -->
  
  <!-- DIGIT POSITION 0 (hundreds slot, x0=89) -->
  <use class="seg seg-0-a default-on" href="#seg" x="119" y="80"/>
  <use class="seg seg-0-b default-on" href="#seg" x="144" y="105" transform="rotate(90 144 105)"/>
  <use class="seg seg-0-c default-on" href="#seg" x="144" y="155" transform="rotate(90 144 155)"/>
  <use class="seg seg-0-d default-on" href="#seg" x="119" y="180"/>
  <use class="seg seg-0-e default-on" href="#seg" x="94"  y="155" transform="rotate(90 94 155)"/>
  <use class="seg seg-0-f default-on" href="#seg" x="94"  y="105" transform="rotate(90 94 105)"/>
  <use class="seg seg-0-g default-on" href="#seg" x="119" y="130"/>
  
  <!-- DIGIT POSITION 1 (x0=169) -->
  <use class="seg seg-1-a default-on" href="#seg" x="199" y="80"/>
  <use class="seg seg-1-b default-on" href="#seg" x="224" y="105" transform="rotate(90 224 105)"/>
  <use class="seg seg-1-c default-on" href="#seg" x="224" y="155" transform="rotate(90 224 155)"/>
  <use class="seg seg-1-d default-on" href="#seg" x="199" y="180"/>
  <use class="seg seg-1-e default-on" href="#seg" x="174" y="155" transform="rotate(90 174 155)"/>
  <use class="seg seg-1-f default-on" href="#seg" x="174" y="105" transform="rotate(90 174 105)"/>
  <use class="seg seg-1-g default-on" href="#seg" x="199" y="130"/>
  
  <!-- DIGIT POSITION 2 (x0=249) -->
  <use class="seg seg-2-a default-on" href="#seg" x="279" y="80"/>
  <use class="seg seg-2-b default-on" href="#seg" x="304" y="105" transform="rotate(90 304 105)"/>
  <use class="seg seg-2-c default-on" href="#seg" x="304" y="155" transform="rotate(90 304 155)"/>
  <use class="seg seg-2-d default-on" href="#seg" x="279" y="180"/>
  <use class="seg seg-2-e default-on" href="#seg" x="254" y="155" transform="rotate(90 254 155)"/>
  <use class="seg seg-2-f default-on" href="#seg" x="254" y="105" transform="rotate(90 254 105)"/>
  <use class="seg seg-2-g default-on" href="#seg" x="279" y="130"/>
  
  <!-- DIGIT POSITION 3 (x0=333) -->
  <use class="seg seg-3-a default-on" href="#seg" x="363" y="80"/>
  <use class="seg seg-3-b default-on" href="#seg" x="388" y="105" transform="rotate(90 388 105)"/>
  <use class="seg seg-3-c default-on" href="#seg" x="388" y="155" transform="rotate(90 388 155)"/>
  <use class="seg seg-3-d default-on" href="#seg" x="363" y="180"/>
  <use class="seg seg-3-e default-on" href="#seg" x="338" y="155" transform="rotate(90 338 155)"/>
  <use class="seg seg-3-f default-on" href="#seg" x="338" y="105" transform="rotate(90 338 105)"/>
  <use class="seg seg-3-g default-on" href="#seg" x="363" y="130"/>
  
  <!-- DECIMAL POINTS (between positions) -->
  <rect class="dp dp-after-1 default-on" x="234" y="173" width="14" height="14" rx="1" fill="#1DB954"/>
  <rect class="dp dp-after-2 default-on" x="314" y="173" width="14" height="14" rx="1" fill="#1DB954"/>
  
  <!-- ============ DEFAULT DISPLAY: "72.5" ============
       Light up the segments needed for "_72.5":
         pos 0: blank (no segments lit)
         pos 1: "7" → a, b, c
         pos 2: "2" → a, b, g, e, d
         pos 3: "5" → a, f, g, c, d
         dp:    after position 2 -->
  <style>
    .seg-1-a.default-on, .seg-1-b.default-on, .seg-1-c.default-on,
    .seg-2-a.default-on, .seg-2-b.default-on, .seg-2-g.default-on, .seg-2-e.default-on, .seg-2-d.default-on,
    .seg-3-a.default-on, .seg-3-f.default-on, .seg-3-g.default-on, .seg-3-c.default-on, .seg-3-d.default-on,
    .dp-after-2.default-on {
      display: inline;
    }
  </style>
</svg>

<div class="row">
  <label>Weight: <input id="weight" type="number" step="0.1" value="72.5"></label>
  <button onclick="updateDisplay()">Update</button>
</div>
<div class="row">
  <button onclick="setWeight(0.0)">0.0</button>
  <button onclick="setWeight(8.8)">8.8</button>
  <button onclick="setWeight(72.5)">72.5</button>
  <button onclick="setWeight(99.9)">99.9</button>
  <button onclick="setWeight(150)">150</button>
  <button onclick="setWeight(188.8)">188.8</button>
</div>
<script>
document.querySelectorAll('.default-on').forEach(el => el.classList.remove('default-on'));
const DIGIT_SEGMENTS = {0:['a','b','c','d','e','f'],1:['b','c'],2:['a','b','g','e','d'],3:['a','b','g','c','d'],4:['f','g','b','c'],5:['a','f','g','c','d'],6:['a','f','g','e','c','d'],7:['a','b','c'],8:['a','b','c','d','e','f','g'],9:['a','b','f','g','c','d']};
function setSegment(p,l,on){const el=document.querySelector('.seg-'+p+'-'+l);if(el)el.classList.toggle('on',on);}
function setDecimal(p,on){const el=document.querySelector('.dp-after-'+p);if(el)el.classList.toggle('on',on);}
function setDigit(p,d){for(const s of 'abcdefg')setSegment(p,s,false);if(d!==null&&d>=0&&d<=9){for(const s of DIGIT_SEGMENTS[d])setSegment(p,s,true);}}
function displayWeight(w){const r=Math.round(w*10)/10;const i=Math.floor(r);const dp=Math.round((r-i)*10);for(let p=0;p<=3;p++)setDigit(p,null);setDecimal(1,false);setDecimal(2,false);if(r>=100){setDigit(0,Math.floor(i/100));setDigit(1,Math.floor((i%100)/10));setDigit(2,i%10);if(dp>0){setDigit(3,dp);setDecimal(2,true);}}else{const t=Math.floor(i/10);if(t>0)setDigit(1,t);setDigit(2,i%10);setDigit(3,dp);setDecimal(2,true);}}
function updateDisplay(){const w=parseFloat(document.getElementById('weight').value);if(!isNaN(w))displayWeight(w);}
function setWeight(w){document.getElementById('weight').value=w;displayWeight(w);}
displayWeight(72.5);
</script>
</body>
</html>
