<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moje váha</title>

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4 https://accounts.google.com https://accounts.google.com/gsi https://accounts.google.com/gsi/client https://apis.google.com https://www.gstatic.com https://content.googleapis.com 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    frame-src https://accounts.google.com https://accounts.google.com/gsi https://content.googleapis.com;
    connect-src https://www.googleapis.com https://www.gstatic.com https://content.googleapis.com;">

  <!-- Tailwind CSS via Browser CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" defer></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold mb-4 text-center">Moje váha</h1>
    <div id="auth-section" class="text-center">
      <button id="login-btn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
        Přihlásit přes Google
      </button>
    </div>
    <div id="app-section" class="hidden">
      <form id="weight-form" class="space-y-4">
        <div>
          <label for="datetime" class="block text-sm font-medium">Datum a čas</label>
          <input type="datetime-local" id="datetime" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" />
        </div>
        <div>
          <label for="weight" class="block text-sm font-medium">Hmotnost (kg)</label>
          <input type="number" step="0.1" id="weight" placeholder="72.5" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" />
        </div>
        <button type="submit" class="w-full px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">
          Uložit
        </button>
      </form>
      <p id="status" class="text-sm text-gray-500 mt-2 hidden"></p>
      <hr class="my-4" />
      <h2 class="text-xl font-semibold mb-2">Historie</h2>
      <ul id="history-list" class="space-y-2 max-h-64 overflow-auto"></ul>
      <button id="logout-btn" class="mt-4 w-full px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">
        Odhlásit se
      </button>
    </div>
  </div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- GAPI client for Drive -->
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <script>
    // Konfigurace
    const CLIENT_ID = '562922982244-e4ci4pc7pj3tche4dat3ra6oam17ath8.apps.googleusercontent.com';
    const SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
    const FILE_NAME = 'weight_records.json';

    let tokenClient;
    let accessToken = null;
    let gapiReady = false;
    let records = [];
    let fileId = null;
    let recordsLoaded = false;

    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const authSection = document.getElementById('auth-section');
    const appSection = document.getElementById('app-section');
    const weightForm = document.getElementById('weight-form');
    const submitBtn = weightForm.querySelector('button[type="submit"]');
    const historyList = document.getElementById('history-list');
    const datetimeInput = document.getElementById('datetime');
    const weightInput = document.getElementById('weight');
    const statusEl = document.getElementById('status');

    window.onload = () => {
      datetimeInput.value = toLocalInputValue(new Date());
      initGapi();
      initGis();
    };

    function toLocalInputValue(d) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function setStatus(text, tone = 'info') {
      if (!text) {
        statusEl.classList.add('hidden');
        statusEl.textContent = '';
        return;
      }
      statusEl.textContent = text;
      statusEl.className = 'text-sm mt-2 ' + (tone === 'error' ? 'text-red-600' : 'text-gray-500');
    }

    function describeDriveError(err) {
      const reason = err?.result?.error?.errors?.[0]?.reason || err?.error?.errors?.[0]?.reason;
      const message = err?.result?.error?.message || err?.error?.message || err?.message || 'neznámá chyba';
      if (reason === 'storageQuotaExceeded') {
        return 'Vaše Google úložiště je plné. Uvolněte místo na Google Drive a zkuste to znovu.';
      }
      return message;
    }

    function initGapi() {
      gapi.load('client', async () => {
        await gapi.client.init({
          discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
        });
        gapiReady = true;
      });
    }

    function initGis() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        ux_mode: 'popup',
        callback: (tokenResponse) => {
          if (tokenResponse.error) {
            console.error('Token error', tokenResponse);
            return;
          }
          accessToken = tokenResponse.access_token;
          onSignIn();
        }
      });
    }

    loginBtn.addEventListener('click', () => {
      if (!accessToken) tokenClient.requestAccessToken({ prompt: 'consent' });
    });

    logoutBtn.addEventListener('click', () => {
      if (accessToken) google.accounts.oauth2.revoke(accessToken);
      accessToken = null;
      records = [];
      fileId = null;
      recordsLoaded = false;
      authSection.classList.remove('hidden');
      appSection.classList.add('hidden');
      historyList.innerHTML = '';
      setStatus('');
    });

    async function onSignIn() {
      authSection.classList.add('hidden');
      appSection.classList.remove('hidden');
      await loadRecords();
    }

    weightForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!accessToken) {
        alert('Nejste přihlášeni.');
        return;
      }
      if (!gapiReady || !recordsLoaded) {
        alert('Data se ještě načítají, zkuste to za chvíli.');
        return;
      }
      const local = datetimeInput.value;
      const weight = parseFloat(weightInput.value);
      if (!local || Number.isNaN(weight)) {
        alert('Vyplňte datum/čas a hmotnost.');
        return;
      }
      const datetime = new Date(local).toISOString();
      await saveRecord({ datetime, weight });
    });

    async function findAppDataFile() {
      const res = await gapi.client.drive.files.list({
        spaces: 'appDataFolder',
        fields: 'files(id,name)',
        q: `name='${FILE_NAME}' and 'appDataFolder' in parents`
      });
      return res.result.files[0] || null;
    }

    async function loadRecords() {
      setStatus('Načítám...');
      try {
        const file = await findAppDataFile();
        if (file) {
          fileId = file.id;
          const download = await gapi.client.drive.files.get({ fileId, alt: 'media' });
          records = JSON.parse(download.body || '[]');
        } else {
          fileId = null;
          records = [];
        }
        recordsLoaded = true;
        renderRecords();
        setStatus('');
      } catch (err) {
        console.error('Error loading records', err);
        setStatus('Chyba při načítání: ' + describeDriveError(err), 'error');
      }
    }

    async function saveRecord(entry) {
      submitBtn.disabled = true;
      setStatus('Ukládám...');
      records.push(entry);
      try {
        if (fileId) {
          const updateUrl = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`;
          const res = await fetch(updateUrl, {
            method: 'PATCH',
            headers: {
              Authorization: `Bearer ${accessToken}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(records)
          });
          if (!res.ok) throw await res.json();
        } else {
          const metadata = { name: FILE_NAME, parents: ['appDataFolder'] };
          const createUrl = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id';
          const blob = new Blob([JSON.stringify(records)], { type: 'application/json' });
          const form = new FormData();
          form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
          form.append('file', blob);
          const res = await fetch(createUrl, {
            method: 'POST',
            headers: { Authorization: `Bearer ${accessToken}` },
            body: form
          });
          if (!res.ok) throw await res.json();
          const created = await res.json();
          fileId = created.id;
        }
        renderRecords();
        weightInput.value = '';
        datetimeInput.value = toLocalInputValue(new Date());
        setStatus('');
      } catch (err) {
        console.error('Error saving record', err);
        records.pop();
        setStatus('Chyba při ukládání: ' + describeDriveError(err), 'error');
      } finally {
        submitBtn.disabled = false;
      }
    }

    const formatter = new Intl.DateTimeFormat(undefined, { dateStyle: 'short', timeStyle: 'short' });

    function renderRecords() {
      historyList.innerHTML = '';
      if (records.length === 0) {
        const li = document.createElement('li');
        li.className = 'p-2 text-gray-500';
        li.textContent = 'Žádné záznamy k zobrazení.';
        historyList.appendChild(li);
        return;
      }
      const sorted = records.slice().sort((a, b) => new Date(b.datetime) - new Date(a.datetime));
      const frag = document.createDocumentFragment();
      sorted.forEach(e => {
        const li = document.createElement('li');
        li.className = 'p-2 bg-gray-50 rounded flex justify-between';
        li.textContent = `${formatter.format(new Date(e.datetime))}: ${e.weight} kg`;
        frag.appendChild(li);
      });
      historyList.appendChild(frag);
    }
  </script>
</body>
</html>
