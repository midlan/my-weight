          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>

    <div id="app-section" style="display: none;">
      <div class="flex flex-wrap gap-1 mb-2">

        <div>

      <header class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold">Menu</h2>
        <button id="menu-close-btn" class="p-1 rounded text-gray-700 hover:bg-gray-100" title="Zavřít">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </header>
      <div class="space-y-2">
        <button id="export-btn" class="w-full px-4 py-2 bg-gray-100 text-gray-700 border border-gray-300 rounded hover:bg-gray-200 transition">

              <circle cx="12" cy="12" r="10"/>

      <button id="privacy-menu-btn" class="w-full px-4 py-2 bg-gray-100 text-gray-700 border border-gray-300 rounded hover:bg-gray-200 transition">

    <div id="privacy-overlay" class="hidden fixed inset-0 z-50 bg-gray-100 overflow-auto">
      <div class="bg-white p-6 w-full min-h-screen sm:max-w-2xl sm:mx-auto sm:my-6 sm:min-h-0 sm:rounded-lg sm:shadow-lg">
        <header class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold">Zásady ochrany osobních údajů</h2>
          <button id="privacy-close-btn" class="p-1 rounded text-gray-700 hover:bg-gray-100" title="Zavřít">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6">

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- GAPI client for Drive -->
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <script>
    // Konfigurace
    const CLIENT_ID = '562922982244-e4ci4pc7pj3tche4dat3ra6oam17ath8.apps.googleusercontent.com';
    const SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
    const FILE_NAME = 'weight_records.json';
    const SCHEMA_VERSION = 1;

    let tokenClient;
    let accessToken = null;
    let gapiReady = false;
    let records = [];
    let settings = {};
    let fileId = null;
    let revisionId = null;
    let recordsLoaded = false;
    let settingsSaveTimer = null;

    function scheduleSettingsSave() {
      if (!accessToken || !recordsLoaded) return;
      if (settingsSaveTimer) clearTimeout(settingsSaveTimer);
      settingsSaveTimer = setTimeout(() => {
        settingsSaveTimer = null;
        const apply = () => {
          settings.rangePreset = currentPreset;
          return true;
        };
        uploadWithConflictRetry(apply).then(({ refetched }) => {
          if (refetched) {
            // Concurrent change pulled in fresh records — show them.
            renderRecords();
            renderChart();
          }
        }).catch(err => console.error('Failed to save settings', err));
      }, 500);
    }

    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const menuBtn = document.getElementById('menu-btn');
    const menuCloseBtn = document.getElementById('menu-close-btn');
    const menuOverlay = document.getElementById('menu-overlay');
    const privacyOverlay = document.getElementById('privacy-overlay');
    const privacyCloseBtn = document.getElementById('privacy-close-btn');
    const privacyMenuBtn = document.getElementById('privacy-menu-btn');
    const privacyLoginLink = document.getElementById('privacy-login-link');
    const exportBtn = document.getElementById('export-btn');
    const importBtn = document.getElementById('import-btn');
    const importInput = document.getElementById('import-input');
    const importHelpBtn = document.getElementById('import-help-btn');
    const loadingSection = document.getElementById('loading-section');
    const loadingMessageEl = document.getElementById('loading-message');
    const authSection = document.getElementById('auth-section');
    const appSection = document.getElementById('app-section');

    let currentSection = 'loading';
    function showSection(name) {
      currentSection = name;
      loadingSection.style.display = name === 'loading' ? '' : 'none';
      authSection.style.display = name === 'auth' ? '' : 'none';
      appSection.style.display = name === 'app' ? '' : 'none';
      menuBtn.classList.toggle('hidden', name !== 'app');
    }

    menuBtn.addEventListener('click', () => {
      menuOverlay.classList.remove('hidden');
    });

    menuCloseBtn.addEventListener('click', () => {
      menuOverlay.classList.add('hidden');
    });

    const privacyContentEl = document.getElementById('privacy-modal-content');
    let privacyContentLoaded = false;
    let privacyContentPromise = null;

    function loadPrivacyContent() {
      if (privacyContentLoaded) return Promise.resolve();
      if (privacyContentPromise) return privacyContentPromise;
      privacyContentPromise = (async () => {
        try {
          const res = await fetch('privacy.html');
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const html = await res.text();
          const doc = new DOMParser().parseFromString(html, 'text/html');
          const source = doc.getElementById('privacy-content');
          if (!source) throw new Error('privacy-content not found');
          privacyContentEl.replaceChildren(...source.childNodes);
          privacyContentLoaded = true;
        } catch (err) {
          console.warn('Failed to load privacy content', err);
          privacyContentEl.innerHTML = 'Nepodařilo se načíst zásady. Otevřete <a class="underline text-blue-600" href="privacy.html">privacy.html</a>.';
        } finally {
          privacyContentPromise = null;
        }
      })();
      return privacyContentPromise;
    }

    function showPrivacyOverlay() {
      privacyOverlay.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
    }
    function hidePrivacyOverlay() {
      privacyOverlay.classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
    }

    async function openPrivacy() {
      menuOverlay.classList.add('hidden');
      if (privacyContentLoaded) {
        showPrivacyOverlay();
        return;
      }
      const restoreSection = currentSection;
      showLoading('Načítám zásady...');
      await loadPrivacyContent();
      showSection(restoreSection);
      showPrivacyOverlay();
    }
    privacyMenuBtn.addEventListener('click', openPrivacy);
    privacyLoginLink.addEventListener('click', (e) => { e.preventDefault(); openPrivacy(); });
    privacyCloseBtn.addEventListener('click', hidePrivacyOverlay);

    function showLoading(msg = 'Načítám...') {
      loadingMessageEl.textContent = msg;
      showSection('loading');
    }
    const weightForm = document.getElementById('weight-form');
    const submitBtn = weightForm.querySelector('button[type="submit"]');
    const wipeBtn = document.getElementById('wipe-btn');
    const historyList = document.getElementById('history-list');
    const datetimeInput = document.getElementById('datetime');
    const nowBtn = document.getElementById('now-btn');
    const weightInput = document.getElementById('weight');
    const weightDecrementBtn = document.getElementById('weight-decrement');
    const weightIncrementBtn = document.getElementById('weight-increment');
    const noteInput = document.getElementById('note');

    function adjustWeight(input, delta) {
      const cur = parseFloat(input.value);
      const base = Number.isNaN(cur) ? 0 : cur;
      input.value = (Math.round((base + delta) * 10) / 10).toFixed(1);
    }
    weightDecrementBtn.addEventListener('click', () => adjustWeight(weightInput, -0.1));
    weightIncrementBtn.addEventListener('click', () => adjustWeight(weightInput, 0.1));
    const paginationEl = document.getElementById('pagination');
    const prevPageBtn = document.getElementById('prev-page');
    const nextPageBtn = document.getElementById('next-page');
    const pageInfoEl = document.getElementById('page-info');
    const pageSizeSelect = document.getElementById('page-size');

    const ALLOWED_PAGE_SIZES = [10, 25, 50, 100, 250, 500];
    const ALLOWED_PRESETS = ['7d', '30d', '3m', '6m', '1y', 'all'];

    function effectivePreset() {
      const stored = settings.rangePreset;
      return ALLOWED_PRESETS.includes(stored) ? stored : '7d';
    }
    let pageSize = 10;
    pageSizeSelect.value = String(pageSize);
    let currentPage = 0;

    const rangeFromInput = document.getElementById('range-from');
    const rangeToInput = document.getElementById('range-to');
    const chartCanvas = document.getElementById('weight-chart');
    const chartEmptyEl = document.getElementById('chart-empty');
    let chart = null;

    let editingIndex = -1;
    let editingDatetimeMin = '';
    let isSavingEdit = false;
    let deletingIndex = -1;
    let nowMode = true;
    const expandedNotes = new WeakSet();
    let silentAttempt = false;
    let silentTimeoutId = null;
    let currentPreset = '7d';

    function clearSilentState() {
      if (silentTimeoutId) {
        clearTimeout(silentTimeoutId);
        silentTimeoutId = null;
      }
      silentAttempt = false;
    }
    const initState = { gapi: false, gis: false };

    const TOKEN_STORAGE_KEY = 'my-weight:token';

    function loadStoredToken() {
      try {
        const raw = localStorage.getItem(TOKEN_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed.token !== 'string' || typeof parsed.expiresAt !== 'number') return null;
        if (Date.now() >= parsed.expiresAt - 60_000) return null;
        return parsed.token;
      } catch { return null; }
    }

    function storeToken(token, expiresInSec) {
      try {
        localStorage.setItem(TOKEN_STORAGE_KEY, JSON.stringify({
          token,
          expiresAt: Date.now() + (expiresInSec || 3600) * 1000,
        }));
      } catch {}
    }

    function clearStoredToken() {
      try { localStorage.removeItem(TOKEN_STORAGE_KEY); } catch {}
    }

    function hasStoredTokenRecord() {
      try { return localStorage.getItem(TOKEN_STORAGE_KEY) !== null; }
      catch { return false; }
    }

    const ICON_EDIT = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>';
    const ICON_TRASH = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>';
    const ICON_CHECK = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>';
    const ICON_CANCEL = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>';

    window.onload = () => {
      initGapi();
      initGis();
    };

    function activateDatetimeInput() {
      nowMode = false;
      datetimeInput.value = toLocalInputValue(new Date());
      nowBtn.classList.add('hidden');
      datetimeInput.classList.remove('hidden');
      datetimeInput.focus();
      // On touch devices (phones / tablets) open the picker immediately
      // so the user doesn't have to tap a second time. Desktops with a
      // mouse keep the previous behaviour: focus only, picker on demand.
      if (window.matchMedia?.('(pointer: coarse)').matches) {
        try { datetimeInput.showPicker(); } catch {}
      }
    }

    function resetToNowMode() {
      nowMode = true;
      datetimeInput.value = '';
      datetimeInput.classList.add('hidden');
      nowBtn.classList.remove('hidden');

    function toDateInputValue(d) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function applyRangePreset(preset) {
      const now = new Date();
      const to = new Date(now);
      let from = new Date(now);
      switch (preset) {
        case '7d': from.setDate(from.getDate() - 7); break;
        case '30d': from.setDate(from.getDate() - 30); break;
        case '3m': from.setMonth(from.getMonth() - 3); break;
        case '6m': from.setMonth(from.getMonth() - 6); break;
        case '1y': from.setFullYear(from.getFullYear() - 1); break;
        case 'all':
          if (records.length > 0) {
            const oldest = records.reduce((min, r) => {
              const t = new Date(r.datetime).getTime();
              return t < min ? t : min;
            }, Infinity);
            from = new Date(oldest);
          } else {
            from.setFullYear(from.getFullYear() - 1);
          }
          break;
      }
      rangeFromInput.value = toDateInputValue(from);
      rangeToInput.value = toDateInputValue(to);
      currentPreset = preset;
      updatePresetButtons();
    }

    function updatePresetButtons() {
      document.querySelectorAll('.range-btn').forEach(btn => {
        const active = btn.dataset.range === currentPreset;
        btn.classList.toggle('bg-blue-600', active);
        btn.classList.toggle('text-white', active);
        btn.classList.toggle('hover:bg-blue-700', active);
        btn.classList.toggle('bg-gray-200', !active);
        btn.classList.toggle('hover:bg-gray-300', !active);
      });
    }

    function toLocalInputValue(d) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function describeDriveError(err) {
      const reason = err?.result?.error?.errors?.[0]?.reason || err?.error?.errors?.[0]?.reason;
      const message = err?.result?.error?.message || err?.error?.message || err?.message || 'neznámá chyba';
      if (reason === 'storageQuotaExceeded') {
        return 'Vaše Google úložiště je plné. Uvolněte místo na Google Drive a zkuste to znovu.';
      }
      return message;
    }

    function initGapi() {
      gapi.load('client', async () => {
        await gapi.client.init({
          discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
        });
        gapiReady = true;
        initState.gapi = true;
        checkReady();
      });
    }

    function initGis() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        ux_mode: 'popup',
        callback: (tokenResponse) => {
          const wasSilent = silentAttempt;
          clearSilentState();
          if (tokenResponse.error) {
            if (!wasSilent) console.error('Token error', tokenResponse);
            showSection('auth');
            return;
          }
          accessToken = tokenResponse.access_token;
          storeToken(accessToken, parseInt(tokenResponse.expires_in, 10));
          if (gapiReady) gapi.client.setToken({ access_token: accessToken });
          onSignIn();
        },
        error_callback: (err) => {
          console.warn('Token client error', err);
          clearSilentState();
          showSection('auth');
        }
      });
      initState.gis = true;
      checkReady();
    }

    function checkReady() {
      if (initState.gapi && initState.gis) attemptAutoLogin();
    }

    function attemptAutoLogin() {
      const cached = loadStoredToken();
      if (cached) {
        accessToken = cached;
        gapi.client.setToken({ access_token: accessToken });
        onSignIn();
        return;
      }
      if (!hasStoredTokenRecord()) {
        // First visit (or fresh incognito) — no evidence the user has
        // signed in here before. Skip the silent token request: without
        // a user gesture and with third-party cookies often blocked,
        // it ends up triggering a blocked-popup warning. Show the
        // login button and let the next click open a normal popup.
        showSection('auth');
        return;
      }
      silentAttempt = true;
      silentTimeoutId = setTimeout(() => {
        if (!silentAttempt) return;
        console.warn('Silent token request timed out (likely a blocked popup)');
        clearSilentState();
        showSection('auth');
      }, 8000);
      tokenClient.requestAccessToken({ prompt: 'none' });
    }

    async function findAppDataFile() {
      const res = await gapi.client.drive.files.list({
        spaces: 'appDataFolder',
        fields: 'files(id,name,headRevisionId)',
        q: `name='${FILE_NAME}' and 'appDataFolder' in parents`
      });
      return res.result.files[0] || null;
    }

    async function fetchFromDrive() {
      const file = await findAppDataFile();
      if (!file) {
        fileId = null;
        revisionId = null;
        records = [];
        settings = {};
        return { exists: false, migrated: false };
      }
      fileId = file.id;
      revisionId = file.headRevisionId || null;
      const download = await gapi.client.drive.files.get({ fileId, alt: 'media' });
      const parsed = JSON.parse(download.body || 'null');
      const result = migrate(parsed);
      records = result.records;
      settings = result.settings;
      return { exists: true, migrated: result.migrated };
    }

    // Refetch content for an already-known fileId. Skips the list query
    // since we already have the id, so a conflict-resolution path can
    // do exactly 1 GET (content) instead of 2 (list + content). The
    // caller is responsible for setting revisionId — typically reusing
    // the value just observed by the pre-flight metadata GET.
    async function fetchContentByFileId() {
      const download = await gapi.client.drive.files.get({ fileId, alt: 'media' });
      const parsed = JSON.parse(download.body || 'null');
      const result = migrate(parsed);
      records = result.records;
      settings = result.settings;
    }

    function migrate(parsed) {
      let rawRecords;
      let parsedSettings = {};
      let migrated = false;
      if (Array.isArray(parsed)) {
        rawRecords = parsed;
        migrated = true;
      } else if (parsed && typeof parsed === 'object' && Array.isArray(parsed.records)) {
        rawRecords = parsed.records;
        if (parsed.version !== SCHEMA_VERSION) migrated = true;
        if (parsed.settings && typeof parsed.settings === 'object' && !Array.isArray(parsed.settings)) {
          parsedSettings = parsed.settings;
        }
      } else {
        rawRecords = [];
        migrated = true;
      }

      const normalized = [];
      for (const r of rawRecords) {
        if (!r || typeof r.weight !== 'number') { migrated = true; continue; }
        const note = (typeof r.note === 'string' && r.note.length > 0) ? r.note : null;
        if (typeof r.datetime === 'string' && !Number.isNaN(new Date(r.datetime).getTime())) {
          const rec = { datetime: r.datetime, weight: r.weight };
          if (note) rec.note = note;
          normalized.push(rec);
          continue;
        }
        if (typeof r.date === 'string') {
          const dt = new Date(r.date + 'T12:00:00');
          if (!Number.isNaN(dt.getTime())) {
            const rec = { datetime: dt.toISOString(), weight: r.weight };
            if (note) rec.note = note;
            normalized.push(rec);
            migrated = true;
            continue;
          }
        }
        migrated = true;
      }
      return { records: normalized, settings: parsedSettings, migrated };
    }

    function buildUploadError(res, body) {
      const err = new Error(body?.error?.message || `HTTP ${res.status}`);
      err.status = res.status;
      err.error = body?.error;
      err.result = { error: body?.error };
      return err;
    }

    async function uploadRecords() {
      const payload = JSON.stringify({ version: SCHEMA_VERSION, records, settings });
      if (fileId) {
        const updateUrl = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media&fields=id,headRevisionId`;
        const headers = {
          Authorization: `Bearer ${accessToken}`,
          'Content-Type': 'application/json'
        };
        const res = await fetch(updateUrl, { method: 'PATCH', headers, body: payload });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw buildUploadError(res, body);
        }
        const updated = await res.json();
        revisionId = updated.headRevisionId || null;
      } else {
        const metadata = { name: FILE_NAME, parents: ['appDataFolder'] };
        const createUrl = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,headRevisionId';
        const blob = new Blob([payload], { type: 'application/json' });
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', blob);
        const res = await fetch(createUrl, {
          method: 'POST',
          headers: { Authorization: `Bearer ${accessToken}` },
          body: form
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw buildUploadError(res, body);
        }
        const created = await res.json();
        fileId = created.id;
        revisionId = created.headRevisionId || null;
      }
    }

    // Drive API v3 ignores the If-Match header, so we implement optimistic
    // concurrency manually: before each PATCH, fetch only the headRevisionId
    // and compare with what we cached on load. Any mismatch (or 404 if the
    // file was deleted) means another device wrote to the file, so we refetch
    // its content and re-run the user's intent on the fresh state.
    async function readRemoteRevision() {
      if (!fileId) return null;
      try {
        const res = await gapi.client.drive.files.get({
          fileId,
          fields: 'headRevisionId'
        });
        return res.result?.headRevisionId || null;
      } catch (err) {
        const status = err?.status || err?.result?.error?.code;
        if (status === 404) return null;
        throw err;
      }
    }

    // Wraps uploadRecords() with optimistic-concurrency conflict handling.
    // applyIntent() mutates records/settings deterministically and returns
    // false when the user's intent is no longer applicable on the freshly-
    // loaded state (e.g. the record being edited was deleted on another
    // device, or the new datetime is now taken).
    //
    // Network cost:
    //   no file yet (first save) : POST                        (1 req)
    //   no conflict              : GET headRevisionId, PATCH   (2 req)
    //   conflict resolved        : GET headRevisionId,
    //                              GET alt=media,
    //                              PATCH                       (3 req)
    //
    // We skip a second pre-flight after refetch because we just observed
    // the current revisionId — there's nothing newer to check against
    // (Drive's PATCH ignores If-Match either way).
    async function uploadWithConflictRetry(applyIntent, maxRetries = 3) {
      let attempts = 0;
      let didRefetch = false;
      while (true) {
        if (fileId && !didRefetch) {
          const remoteRev = await readRemoteRevision();
          if (remoteRev !== revisionId) {
            if (attempts >= maxRetries) {
              throw new Error('Příliš mnoho konfliktů při ukládání');
            }
            attempts++;
            if (remoteRev === null) {
              // File deleted on another device; treat as starting from empty.
              fileId = null;
              revisionId = null;
              records = [];
              settings = {};
            } else {
              await fetchContentByFileId();
              revisionId = remoteRev;
            }
            didRefetch = true;
            const cont = applyIntent();
            if (!cont) return { success: false, refetched: true };
            continue;
          }
        }
        await uploadRecords();
        return { success: true, refetched: didRefetch };
      }
    }

    async function loadRecords() {
      try {
        const result = await fetchFromDrive();
        recordsLoaded = true;
        if (result.migrated && fileId) {
          // Best-effort rewrite of legacy data into the canonical envelope.
          // A 412 here would mean another device wrote concurrently — drop it
          // silently; the rewrite will be retried on the next load.
          try { await uploadRecords(); } catch (e) { console.warn('Rewrite-on-load failed', e); }
        }
        applyRangePreset(effectivePreset());
        renderRecords();
        renderChart();
        prefillWeightInput();
        showSection('app');
      } catch (err) {
        console.error('Error loading records', err);
        const status = err?.status || err?.result?.error?.code;
        if (status === 401) {
          clearStoredToken();
          accessToken = null;
          if (gapiReady) gapi.client.setToken(null);
          showSection('auth');
          alert('Přihlášení vypršelo, přihlaste se znovu.');
          return;
        }
        if (!recordsLoaded) {
          records = [];
          settings = {};
          recordsLoaded = true;
        }
        applyRangePreset(effectivePreset());
        renderRecords();
        renderChart();
        prefillWeightInput();
        showSection('app');
        alert('Chyba při načítání: ' + describeDriveError(err));
      }
    }

    async function saveRecord(entry) {
      const originalBtnText = submitBtn.textContent;
      submitBtn.textContent = 'Ukládám...';
      const apply = () => {
        if (findDuplicateRecord(entry.datetime) !== -1) return false;
        records.push(entry);
        return true;
      };
      apply();
      try {
        const { success } = await uploadWithConflictRetry(apply);
        if (!success) {
          renderRecords();
          renderChart();
          alert('Záznam s tímto datem byl mezitím přidán z jiného zařízení; nebyl uložen.');
          return;
        }
        currentPage = 0;
        renderRecords();
        renderChart();
        noteInput.value = '';
        if (!nowMode) {
          datetimeInput.value = toLocalInputValue(new Date(entry.datetime));
        }
      } catch (err) {
        console.error('Error saving record', err);
        try { await fetchFromDrive(); renderRecords(); renderChart(); } catch {}
        alert('Chyba při ukládání: ' + describeDriveError(err));
      } finally {
        submitBtn.textContent = originalBtnText;
      }
    }

        revisionId = null;

        editingDatetimeMin = '';

    }

    importInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      e.target.value = '';
      if (!file) return;
      let parsed;
      try {
        parsed = JSON.parse(await file.text());
      } catch (err) {
        alert('Soubor není platný JSON.');
        return;
      }
      let incoming;
      if (parsed && (Array.isArray(parsed) || (typeof parsed === 'object' && Array.isArray(parsed.records)))) {
        incoming = migrate(parsed).records;
      } else if (parsed && parsed.data && Array.isArray(parsed.data.values)) {
        incoming = parsed.data.values
          .map(v => {
            if (!v || typeof v.from !== 'number') return null;
            const dt = new Date(v.from);
            const w = typeof v.value === 'number' ? v.value : parseFloat(v.value);
            if (Number.isNaN(dt.getTime()) || Number.isNaN(w)) return null;
            return { datetime: dt.toISOString(), weight: w };
          })
          .filter(Boolean);
      } else {
        alert('Soubor nemá rozpoznaný formát (my-weight nebo kaloricketabulky.cz).');
        return;
      }
      if (incoming.length === 0) {
        alert('Soubor neobsahuje žádné platné záznamy.');
        return;
      }
      const toAdd = [];
      const seenMinutes = new Set(records
        .filter(r => r && typeof r.datetime === 'string')
        .map(r => isoToMinute(r.datetime)));
      let skipped = 0;
      for (const r of incoming) {
        const min = isoToMinute(r.datetime);
        if (seenMinutes.has(min)) { skipped++; continue; }
        seenMinutes.add(min);
        toAdd.push(r);
      }
      if (toAdd.length === 0) {
        alert(`Všech ${incoming.length} záznamů ze souboru už existuje, nic se nepřidá.`);
        return;
      }
      const msg = skipped > 0
        ? `Naimportovat ${toAdd.length} nových záznamů? (${skipped} duplicitních bude přeskočeno.)`
        : `Naimportovat ${toAdd.length} záznamů?`;
      if (!confirm(msg)) return;
      menuOverlay.classList.add('hidden');
      showLoading('Importuji...');
      const apply = () => {
        const seen = new Set(records
          .filter(r => r && typeof r.datetime === 'string')
          .map(r => isoToMinute(r.datetime)));
        let added = 0;
        for (const r of toAdd) {
          const min = isoToMinute(r.datetime);
          if (seen.has(min)) continue;
          seen.add(min);
          records.push(r);
          added++;
        }
        return true;
      };
      apply();
      try {
        await uploadWithConflictRetry(apply);
        renderRecords();
        renderChart();
        showSection('app');
        alert(`Naimportováno ${toAdd.length} záznamů.`);
      } catch (err) {
        console.error('Error importing records', err);
        try { await fetchFromDrive(); } catch {}
        renderRecords();
        renderChart();
        showSection('app');
        alert('Chyba při importu: ' + describeDriveError(err));
      }
    });

    function formatCzechDateTime(d) {
      const mm = String(d.getMinutes()).padStart(2, '0');
      return `${d.getDate()}.${d.getMonth() + 1}.${d.getFullYear()} ${d.getHours()}:${mm}`;
    }

    function formatWeight(w) {
      return Number(w).toLocaleString(undefined, { maximumFractionDigits: 10 });
    }

    function readEditingRowInputs() {
      if (editingIndex === -1) return null;
      const li = historyList.querySelector(`li[data-idx="${editingIndex}"]`);
      if (!li) return null;
      const fields = li.querySelectorAll('input, textarea');
      if (fields.length < 3) return null;
      return {
        dtValue: fields[0].value,
        weightValue: fields[1].value,
        noteValue: fields[2].value
      };
    }

    // True when `record`'s persisted values match the typed values
    // (datetime compared at minute precision since the form input is
    // minute-resolution; weight is exact equality; note is trimmed).
    function recordMatchesValues(record, datetimeIso, weight, note) {
      return !!record
        && isoToMinute(record.datetime) === isoToMinute(datetimeIso)
        && record.weight === weight
        && (record.note || '') === (note || '');
    }

    function editingRowHasChanges() {
      const inputs = readEditingRowInputs();
      if (!inputs) return false;
      const original = records[editingIndex];
      if (!original) return false;
      const dt = new Date(inputs.dtValue);
      if (Number.isNaN(dt.getTime())) return true; // invalid input → treat as dirty
      const w = parseFloat(inputs.weightValue);
      if (Number.isNaN(w)) return true;
      return !recordMatchesValues(original, dt.toISOString(), w, (inputs.noteValue || '').trim());
    }

    function restoreEditingDraft(draft) {
      if (!draft || editingIndex === -1) return;
      const li = historyList.querySelector(`li[data-idx="${editingIndex}"]`);
      if (!li) return;
      const fields = li.querySelectorAll('input, textarea');
      if (fields.length >= 3) {
        fields[0].value = draft.dtValue;
        fields[1].value = draft.weightValue;
        fields[2].value = draft.noteValue;
      }
    }

    function wrapTooltipNote(text, maxChars) {
      const lines = [];
      for (const rawLine of String(text).split('\n')) {
        if (rawLine.length <= maxChars) { lines.push(rawLine); continue; }
        let current = '';
        for (const word of rawLine.split(/\s+/)) {
          if (!word) continue;
          if (word.length > maxChars) {
            if (current) { lines.push(current); current = ''; }
            for (let i = 0; i < word.length; i += maxChars) {
              const chunk = word.slice(i, i + maxChars);
              if (i + maxChars < word.length) lines.push(chunk);
              else current = chunk;
            }
            continue;
          }
          if (!current) current = word;
          else if ((current + ' ' + word).length <= maxChars) current += ' ' + word;
          else { lines.push(current); current = word; }
        }
        if (current) lines.push(current);
      }
      return lines;
    }

    function isoToMinute(iso) {
      return typeof iso === 'string' ? iso.substring(0, 16) : '';
    }

    function findDuplicateRecord(datetimeIso, excludeIdx = -1) {
      const targetMin = isoToMinute(datetimeIso);
      for (let i = 0; i < records.length; i++) {
        if (i === excludeIdx) continue;
        const r = records[i];
        if (r && isoToMinute(r.datetime) === targetMin) return i;
      }
      return -1;
    }

    function prefillWeightInput() {
      const valid = records.filter(r => r && typeof r.weight === 'number' && typeof r.datetime === 'string' && !Number.isNaN(new Date(r.datetime).getTime()));
      if (valid.length === 0) {
        weightInput.value = '';
        return;
      }
      const newest = valid.reduce((m, r) => new Date(r.datetime) > new Date(m.datetime) ? r : m);
      weightInput.value = String(newest.weight);
    }

    function renderRecords() {
      // Re-resolve editingIndex from the persistent datetime fingerprint —
      // the records array can be reshuffled by deletes / conflict refetches
      // and editingIndex by raw position would silently point at a
      // different record (or out of bounds).
      if (editingIndex !== -1) {
        if (editingDatetimeMin) {
          editingIndex = records.findIndex(r => r && isoToMinute(r.datetime) === editingDatetimeMin);
          if (editingIndex === -1) editingDatetimeMin = '';
        } else {
          editingIndex = -1;
        }
      }
      historyList.innerHTML = '';
      if (records.length === 0) {
        const li = document.createElement('li');
        li.className = 'p-2 text-gray-500';
        li.textContent = 'Žádné záznamy k zobrazení.';
        historyList.appendChild(li);
        paginationEl.classList.add('hidden');
        return;
      }
      const valid = records
        .map((r, i) => ({ r, i }))
        .filter(({ r }) => r && typeof r.datetime === 'string' && !Number.isNaN(new Date(r.datetime).getTime()));
      const sorted = valid.slice().sort((a, b) => new Date(b.r.datetime) - new Date(a.r.datetime));
      const totalPages = Math.max(1, Math.ceil(sorted.length / pageSize));
      if (currentPage >= totalPages) currentPage = totalPages - 1;
      if (currentPage < 0) currentPage = 0;
      const start = currentPage * pageSize;
      const pageItems = sorted.slice(start, start + pageSize);
      const frag = document.createDocumentFragment();
      pageItems.forEach(({ r, i }) => frag.appendChild(buildHistoryRow(r, i)));
      historyList.appendChild(frag);

      if (sorted.length > ALLOWED_PAGE_SIZES[0]) {
        paginationEl.classList.remove('hidden');
        pageInfoEl.textContent = `${start + 1}–${start + pageItems.length} z ${sorted.length}`;
        prevPageBtn.disabled = currentPage === 0;
        nextPageBtn.disabled = currentPage >= totalPages - 1;
      } else {
        paginationEl.classList.add('hidden');
      }
    }

    function iconButton(svg, title, colorClass) {
      const b = document.createElement('button');
      b.type = 'button';
      b.title = title;
      b.className = `p-2 rounded ${colorClass}`;
      b.innerHTML = svg;
      return b;
    }

    function buildHistoryRow(r, idx) {
      const li = document.createElement('li');
      li.dataset.idx = String(idx);

      if (idx === editingIndex) {
        li.className = 'p-2 bg-gray-50 rounded flex flex-col gap-2';

        const dtInput = document.createElement('input');
        dtInput.type = 'datetime-local';
        dtInput.value = toLocalInputValue(new Date(r.datetime));
        dtInput.className = 'flex-[3_1_0%] min-w-0 bg-white border border-gray-300 rounded px-2 py-1 text-sm shadow-sm';

        const wInput = document.createElement('input');
        wInput.type = 'number';
        wInput.step = '0.1';
        wInput.value = String(r.weight);
        wInput.className = 'flex-[4_1_0%] min-w-12 px-1 py-1 text-sm text-center focus:outline-none';

        const wDecrement = document.createElement('button');
        wDecrement.type = 'button';
        wDecrement.title = 'Snížit';
        wDecrement.className = 'flex-[3_1_0%] px-1 bg-gray-100 hover:bg-gray-200 text-sm font-medium border-r border-gray-300';
        wDecrement.textContent = '−';

        const wIncrement = document.createElement('button');
        wIncrement.type = 'button';
        wIncrement.title = 'Zvýšit';
        wIncrement.className = 'flex-[3_1_0%] px-1 bg-gray-100 hover:bg-gray-200 text-sm font-medium border-l border-gray-300';
        wIncrement.textContent = '+';

        const wStepper = document.createElement('div');
        wStepper.className = 'flex-[2_1_0%] flex border border-gray-300 rounded shadow-sm overflow-hidden bg-white';
        wStepper.append(wDecrement, wInput, wIncrement);

        const editNoteInput = document.createElement('textarea');
        editNoteInput.rows = 2;
        editNoteInput.value = r.note || '';
        editNoteInput.placeholder = 'Poznámka';
        editNoteInput.className = 'w-full bg-white border border-gray-300 rounded px-2 py-1 text-sm shadow-sm resize-none';

        let actions;
        if (isSavingEdit) {
          dtInput.disabled = true;
          editNoteInput.disabled = true;
          wInput.disabled = true;
          wDecrement.disabled = true;
          wIncrement.disabled = true;
          actions = document.createElement('span');
          actions.className = 'text-sm text-gray-500 px-2 shrink-0 whitespace-nowrap';
          actions.textContent = 'Ukládám...';
        } else {
          const saveBtn = iconButton(ICON_CHECK, 'Uložit', 'text-green-600 hover:bg-green-50');
          saveBtn.addEventListener('click', () => saveEdit(idx, dtInput.value, wInput.value, editNoteInput.value));

          const cancelBtn = iconButton(ICON_CANCEL, 'Zrušit', 'text-gray-500 hover:bg-gray-200');
          cancelBtn.addEventListener('click', () => { editingIndex = -1; editingDatetimeMin = ''; renderRecords(); });

          wDecrement.addEventListener('click', () => adjustWeight(wInput, -0.1));
          wIncrement.addEventListener('click', () => adjustWeight(wInput, 0.1));

          [dtInput, wInput].forEach(inp => {
            inp.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') { e.preventDefault(); saveBtn.click(); }
              else if (e.key === 'Escape') { e.preventDefault(); cancelBtn.click(); }
            });
          });
          editNoteInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { e.preventDefault(); cancelBtn.click(); }
          });

          actions = document.createElement('div');
          actions.className = 'flex gap-1 shrink-0 -my-1.5 -mr-2';
          actions.append(saveBtn, cancelBtn);
        }

        const topRow = document.createElement('div');
        topRow.className = 'flex items-center gap-2';
        topRow.append(dtInput, wStepper, actions);
        li.append(topRow, editNoteInput);
      } else {
        const isExpanded = !!r.note && expandedNotes.has(r);

        const dateSpan = document.createElement('span');
        dateSpan.textContent = formatCzechDateTime(new Date(r.datetime));

        const weightSpan = document.createElement('span');
        weightSpan.className = 'tabular-nums font-medium text-right min-w-[5rem] shrink-0';
        weightSpan.textContent = `${formatWeight(r.weight)} kg`;

        const actions = document.createElement('div');
        actions.className = 'flex gap-1 shrink-0 -my-1.5 -mr-2';

        if (idx === deletingIndex) {
          const editBtn = iconButton(ICON_EDIT, 'Upravit', 'text-gray-500');
          editBtn.disabled = true;
          editBtn.classList.add('opacity-50');

          const spinnerBtn = document.createElement('button');
          spinnerBtn.type = 'button';
          spinnerBtn.disabled = true;
          spinnerBtn.title = 'Mažu...';
          spinnerBtn.className = 'p-2 rounded text-red-600';
          spinnerBtn.innerHTML = '<div class="w-5 h-5 border-2 border-gray-300 border-t-red-600 rounded-full animate-spin"></div>';

          actions.append(editBtn, spinnerBtn);
        } else if (deletingIndex === -1) {
          const editBtn = iconButton(ICON_EDIT, 'Upravit', 'text-gray-500 hover:bg-blue-50 hover:text-blue-600');
          editBtn.addEventListener('click', () => {
            if (editingIndex !== -1 && editingIndex !== idx) {
              if (editingRowHasChanges()) {
                const orig = records[editingIndex];
                const label = orig && orig.datetime
                  ? `${formatCzechDateTime(new Date(orig.datetime))} (${formatWeight(orig.weight)} kg)`
                  : '';
                alert('Nejprve uložte nebo zrušte úpravy záznamu' + (label ? ': ' + label : '') + '.');
                return;
              }
              // No changes — silently abandon current edit and switch.
            }
            editingIndex = idx;
            editingDatetimeMin = isoToMinute(r.datetime);
            renderRecords();
          });

          const delBtn = iconButton(ICON_TRASH, 'Smazat', 'text-gray-500 hover:bg-red-50 hover:text-red-600');
          delBtn.addEventListener('click', () => deleteRecord(idx));

          actions.append(editBtn, delBtn);
        }

        const noteSpan = document.createElement('span');
        noteSpan.className = 'text-sm text-gray-600';
        if (r.note) {
          noteSpan.textContent = r.note;
          noteSpan.title = r.note;
        }

        const onToggle = () => {
          if (window.getSelection()?.toString()) return;
          if (expandedNotes.has(r)) expandedNotes.delete(r);
          else expandedNotes.add(r);
          renderRecords();
        };

        if (isExpanded) {
          li.className = 'p-2 bg-gray-50 rounded flex flex-col gap-2';
          dateSpan.className = 'flex-1';
          noteSpan.classList.add('whitespace-pre-wrap');

          const topContent = document.createElement('div');
          topContent.className = 'flex items-center gap-2 flex-1 min-w-0';
          topContent.append(dateSpan, weightSpan);
          if (r.note) {
            topContent.style.cursor = 'pointer';
            topContent.addEventListener('click', onToggle);
            noteSpan.style.cursor = 'pointer';
            noteSpan.addEventListener('click', onToggle);
          }

          const topRow = document.createElement('div');
          topRow.className = 'flex items-center gap-2';
          topRow.append(topContent, actions);

          li.append(topRow, noteSpan);
        } else {
          li.className = 'p-2 bg-gray-50 rounded flex items-center gap-2';
          dateSpan.className = 'shrink-0';
          noteSpan.classList.add('flex-1', 'min-w-0', 'truncate');

          const content = document.createElement('div');
          content.className = 'flex items-center gap-2 flex-1 min-w-0';
          content.append(dateSpan, noteSpan, weightSpan);
          if (r.note) {
            content.style.cursor = 'pointer';
            content.addEventListener('click', onToggle);
          }

          li.append(content, actions);
        }
      }
      return li;
    }

    async function deleteRecord(idx) {
      if (idx < 0 || idx >= records.length) return;
      const r = records[idx];
      if (!r) return;
      const label = r.datetime && !Number.isNaN(new Date(r.datetime).getTime())
        ? `${formatCzechDateTime(new Date(r.datetime))} (${formatWeight(r.weight)} kg)`
        : `záznam ${idx}`;
      if (!confirm(`Smazat ${label}?`)) return;
      // Snapshot the typed values from another row's edit mode so the
      // delete-induced re-render doesn't wipe the user's in-progress
      // edit. They get restored after each renderRecords() below.
      const editingDraft = (editingIndex !== -1 && editingIndex !== idx) ? readEditingRowInputs() : null;
      const targetMin = isoToMinute(r.datetime);
      const apply = () => {
        const i = records.findIndex(x => x && isoToMinute(x.datetime) === targetMin);
        if (i !== -1) records.splice(i, 1);
        return true; // idempotent — already-gone is also success
      };
      deletingIndex = idx;
      submitBtn.disabled = true;
      wipeBtn.disabled = true;
      renderRecords();
      restoreEditingDraft(editingDraft);
      apply();
      try {
        await uploadWithConflictRetry(apply);
        deletingIndex = -1;
        renderRecords();
        restoreEditingDraft(editingDraft);
        renderChart();
      } catch (err) {
        console.error('Error deleting record', err);
        deletingIndex = -1;
        try { await fetchFromDrive(); } catch {}
        renderRecords();
        restoreEditingDraft(editingDraft);
        renderChart();
        alert('Chyba při mazání: ' + describeDriveError(err));
      } finally {
        submitBtn.disabled = false;
        wipeBtn.disabled = false;
      }
    }

    async function saveEdit(idx, dtValue, weightValue, noteValue) {
      if (idx < 0 || idx >= records.length) return;
      if (!dtValue) { alert('Vyplňte datum/čas.'); return; }
      const dt = new Date(dtValue);
      if (Number.isNaN(dt.getTime())) { alert('Neplatné datum/čas.'); return; }
      const w = parseFloat(weightValue);
      if (Number.isNaN(w)) { alert('Neplatná hmotnost.'); return; }
      const datetimeIso = dt.toISOString();
      const note = (noteValue || '').trim();
      const original = records[idx];
      // No-op save — typed values match the original record. Skip the
      // upload entirely and silently leave edit mode.
      if (recordMatchesValues(original, datetimeIso, w, note)) {
        editingIndex = -1;
        editingDatetimeMin = '';
        renderRecords();
        return;
      }
      if (findDuplicateRecord(datetimeIso, idx) !== -1) {
        alert('Záznam s tímto datem již existuje.');
        return;
      }
      const updated = { datetime: datetimeIso, weight: w };
      if (note) updated.note = note;
      const oldMin = isoToMinute(original.datetime);
      const apply = () => {
        const i = records.findIndex(x => x && isoToMinute(x.datetime) === oldMin);
        if (i === -1) return false; // original deleted on another device
        // Block if the new datetime is now taken by some other record
        if (findDuplicateRecord(datetimeIso, i) !== -1) return false;
        records[i] = updated;
        editingDatetimeMin = isoToMinute(updated.datetime);
        return true;
      };
      records[idx] = updated;
      editingDatetimeMin = isoToMinute(updated.datetime);
      isSavingEdit = true;
      renderRecords();
      submitBtn.disabled = true;
      wipeBtn.disabled = true;
      try {
        const { success } = await uploadWithConflictRetry(apply);
        isSavingEdit = false;
        if (!success) {
          editingIndex = -1;
          editingDatetimeMin = '';
          renderRecords();
          renderChart();
          alert('Záznam byl mezitím změněn z jiného zařízení; změna nebyla uložena.');
          return;
        }
        editingIndex = -1;
        editingDatetimeMin = '';
        renderRecords();
        renderChart();
      } catch (err) {
        console.error('Error editing record', err);
        isSavingEdit = false;
        try { await fetchFromDrive(); renderRecords(); renderChart(); } catch {}
        const failedLi = historyList.querySelector(`li[data-idx="${idx}"]`);
        if (failedLi) {
          const fields = failedLi.querySelectorAll('input, textarea');
          if (fields.length >= 3) {
            fields[0].value = dtValue;
            fields[1].value = weightValue;
            fields[2].value = noteValue || '';
            fields[1].focus();
          }
        }
        alert('Chyba při ukládání: ' + describeDriveError(err));
      } finally {
        submitBtn.disabled = false;
        wipeBtn.disabled = false;
      }
    }

    pageSizeSelect.addEventListener('change', () => {
      const next = parseInt(pageSizeSelect.value, 10);
      if (!ALLOWED_PAGE_SIZES.includes(next)) return;
      pageSize = next;
      currentPage = 0;
      renderRecords();
    });

    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        applyRangePreset(btn.dataset.range);
        settings.rangePreset = currentPreset;
        scheduleSettingsSave();
        renderChart();
      });
    });

    rangeFromInput.addEventListener('change', () => {
      currentPreset = null;
      updatePresetButtons();
      renderChart();
    });
    rangeToInput.addEventListener('change', () => {
      currentPreset = null;
      updatePresetButtons();
      renderChart();
    });

    function renderChart() {
      if (typeof Chart === 'undefined') return;
      const fromVal = rangeFromInput.value;
      const toVal = rangeToInput.value;
      const fromTs = fromVal ? new Date(fromVal + 'T00:00:00').getTime() : -Infinity;
      const toTs = toVal ? new Date(toVal + 'T23:59:59.999').getTime() : Infinity;

      const allPoints = records
        .map(r => ({
          x: r && typeof r.datetime === 'string' ? new Date(r.datetime).getTime() : NaN,
          y: r ? r.weight : NaN,
          note: r && typeof r.note === 'string' ? r.note : ''
        }))
        .filter(p => !Number.isNaN(p.x) && !Number.isNaN(p.y))
        .sort((a, b) => a.x - b.x);

      const inRange = allPoints.filter(p => p.x >= fromTs && p.x <= toTs);
      let chartPoints = inRange;
      if (inRange.length > 0) {
        let before = null;
        let after = null;
        for (const p of allPoints) {
          if (p.x < fromTs) before = p;
          else if (p.x > toTs) { after = p; break; }
        }
        chartPoints = [
          ...(before ? [before] : []),
          ...inRange,
          ...(after ? [after] : []),
        ];
      }

      if (inRange.length === 0) {
        chartEmptyEl.classList.remove('hidden');
      } else {
        chartEmptyEl.classList.add('hidden');
      }

      const data = {
        datasets: [{
          label: 'Hmotnost (kg)',
          data: chartPoints,
          borderColor: '#16a34a',
          backgroundColor: 'rgba(22, 163, 74, 0.1)',
          tension: 0.2,
          pointRadius: chartPoints.length > 200 ? 0 : 3,
          spanGaps: true,
        }]
      };

      if (chart) {
        chart.data = data;
        chart.options.scales.x.min = isFinite(fromTs) ? fromTs : undefined;
        chart.options.scales.x.max = isFinite(toTs) ? toTs : undefined;
        chart.update();
        return;
      }

      chart = new Chart(chartCanvas, {
        type: 'line',
        data,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: (items) => {
                  if (!items || items.length === 0) return '';
                  const ts = items[0].parsed.x;
                  return new Intl.DateTimeFormat(undefined, { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(ts));
                },
                afterBody: (items) => {
                  const note = items?.[0]?.raw?.note;
                  if (!note) return [];
                  const chartWidth = items[0].chart?.width || 400;
                  const usable = Math.max(120, chartWidth - 50);
                  const maxChars = Math.max(15, Math.floor(usable / 7));
                  return wrapTooltipNote(note, maxChars);
                }
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              min: isFinite(fromTs) ? fromTs : undefined,
              max: isFinite(toTs) ? toTs : undefined,
              ticks: {
                callback: function (value) {
                  const d = new Date(value);
                  const unit = this._unit;
                  let opts;
                  if (unit === 'year') opts = { year: 'numeric' };
                  else if (unit === 'quarter' || unit === 'month') opts = { month: 'short', year: '2-digit' };
                  else if (unit === 'week' || unit === 'day') opts = { day: 'numeric', month: 'short' };
                  else if (unit === 'hour' || unit === 'minute' || unit === 'second') opts = { hour: 'numeric', minute: '2-digit' };
                  else opts = { day: 'numeric', month: 'short' };
                  return new Intl.DateTimeFormat(undefined, opts).format(d);
                }
              }
            },
            y: { title: { display: true, text: 'kg' } }
          }
        }
      });
    }

    prevPageBtn.addEventListener('click', () => {
      if (currentPage > 0) {
        currentPage--;
        renderRecords();
        }
    });

    nextPageBtn.addEventListener('click', () => {
      currentPage++;
      renderRecords();
    });
  </script>
</body>
</html>
