<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moje váha</title>

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net https://accounts.google.com https://accounts.google.com/gsi https://accounts.google.com/gsi/client https://apis.google.com https://www.gstatic.com https://content.googleapis.com 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    frame-src https://accounts.google.com https://accounts.google.com/gsi https://content.googleapis.com;
    connect-src https://www.googleapis.com https://www.gstatic.com https://content.googleapis.com;">

  <!-- Tailwind CSS via Browser CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" defer></script>
  <!-- Chart.js + date adapter -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-2xl my-6">
    <h1 class="text-2xl font-bold mb-4 text-center">Moje váha</h1>
    <div id="loading-section" class="text-center py-8">
      <div class="inline-block w-10 h-10 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin" role="status" aria-label="Načítám"></div>
      <p class="text-sm text-gray-500 mt-2">Načítám...</p>
    </div>
    <div id="auth-section" class="hidden text-center">
      <button id="login-btn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
        Přihlásit přes Google
      </button>
    </div>
    <div id="app-section" class="hidden">
      <form id="weight-form" class="space-y-4">
        <div>
          <label for="datetime" class="block text-sm font-medium">Datum a čas</label>
          <input type="datetime-local" id="datetime" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" />
        </div>
        <div>
          <label for="weight" class="block text-sm font-medium">Hmotnost (kg)</label>
          <input type="number" step="0.1" id="weight" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" />
        </div>
        <button type="submit" class="w-full px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">
          Uložit
        </button>
      </form>
      <p id="status" class="text-sm text-gray-500 mt-2 hidden"></p>
      <hr class="my-4" />
      <h2 class="text-xl font-semibold mb-2">Graf</h2>
      <div class="flex flex-wrap gap-1 mb-2">
        <button type="button" data-range="7d" class="range-btn px-2 py-1 text-sm bg-gray-200 rounded hover:bg-gray-300">7 dní</button>
        <button type="button" data-range="30d" class="range-btn px-2 py-1 text-sm bg-gray-200 rounded hover:bg-gray-300">30 dní</button>
        <button type="button" data-range="6m" class="range-btn px-2 py-1 text-sm bg-gray-200 rounded hover:bg-gray-300">6 měsíců</button>
        <button type="button" data-range="1y" class="range-btn px-2 py-1 text-sm bg-gray-200 rounded hover:bg-gray-300">1 rok</button>
        <button type="button" data-range="5y" class="range-btn px-2 py-1 text-sm bg-gray-200 rounded hover:bg-gray-300">5 let</button>
        <button type="button" data-range="all" class="range-btn px-2 py-1 text-sm bg-gray-200 rounded hover:bg-gray-300">Vše</button>
      </div>
      <div class="flex flex-wrap gap-3 text-sm mb-2">
        <label class="flex items-center gap-1">
          <span>Od:</span>
          <input type="date" id="range-from" class="border-gray-300 rounded" />
        </label>
        <label class="flex items-center gap-1">
          <span>Do:</span>
          <input type="date" id="range-to" class="border-gray-300 rounded" />
        </label>
      </div>
      <div class="relative h-64">
        <canvas id="weight-chart"></canvas>
        <p id="chart-empty" class="absolute inset-0 flex items-center justify-center text-gray-500 text-sm hidden">V rozsahu nejsou žádná data.</p>
      </div>
      <hr class="my-4" />
      <h2 class="text-xl font-semibold mb-2">Historie</h2>
      <ul id="history-list" class="space-y-2 max-h-64 overflow-auto"></ul>
      <div id="pagination" class="mt-2 flex flex-wrap items-center justify-between gap-2 text-sm hidden">
        <label class="flex items-center gap-1 text-gray-600">
          <span>Na stránku:</span>
          <select id="page-size" class="border-gray-300 rounded">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="250">250</option>
            <option value="500">500</option>
          </select>
        </label>
        <div class="flex items-center gap-2">
          <button id="prev-page" type="button" class="px-3 py-1 bg-gray-200 rounded disabled:opacity-50">Předchozí</button>
          <span id="page-info" class="text-gray-600"></span>
          <button id="next-page" type="button" class="px-3 py-1 bg-gray-200 rounded disabled:opacity-50">Další</button>
        </div>
      </div>
      <button id="logout-btn" class="mt-4 w-full px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">
        Odhlásit se
      </button>
      <button id="wipe-btn" class="mt-2 w-full px-4 py-2 bg-red-100 text-red-700 border border-red-300 rounded hover:bg-red-200 transition">
        Smazat všechna data
      </button>
    </div>
  </div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- GAPI client for Drive -->
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <script>
    // Konfigurace
    const CLIENT_ID = '562922982244-e4ci4pc7pj3tche4dat3ra6oam17ath8.apps.googleusercontent.com';
    const SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
    const FILE_NAME = 'weight_records.json';
    const SCHEMA_VERSION = 1;

    let tokenClient;
    let accessToken = null;
    let gapiReady = false;
    let records = [];
    let fileId = null;
    let recordsLoaded = false;

    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const loadingSection = document.getElementById('loading-section');
    const authSection = document.getElementById('auth-section');
    const appSection = document.getElementById('app-section');

    function showSection(name) {
      loadingSection.classList.toggle('hidden', name !== 'loading');
      authSection.classList.toggle('hidden', name !== 'auth');
      appSection.classList.toggle('hidden', name !== 'app');
    }
    const weightForm = document.getElementById('weight-form');
    const submitBtn = weightForm.querySelector('button[type="submit"]');
    const wipeBtn = document.getElementById('wipe-btn');
    const historyList = document.getElementById('history-list');
    const datetimeInput = document.getElementById('datetime');
    const weightInput = document.getElementById('weight');
    const statusEl = document.getElementById('status');
    const paginationEl = document.getElementById('pagination');
    const prevPageBtn = document.getElementById('prev-page');
    const nextPageBtn = document.getElementById('next-page');
    const pageInfoEl = document.getElementById('page-info');
    const pageSizeSelect = document.getElementById('page-size');

    const PAGE_SIZE_KEY = 'my-weight:pageSize';
    const ALLOWED_PAGE_SIZES = [25, 50, 100, 250, 500];
    const RANGE_PRESET_KEY = 'my-weight:rangePreset';
    const ALLOWED_PRESETS = ['7d', '30d', '6m', '1y', '5y', 'all'];

    function loadStoredPreset() {
      try {
        const stored = localStorage.getItem(RANGE_PRESET_KEY);
        return ALLOWED_PRESETS.includes(stored) ? stored : '7d';
      } catch { return '7d'; }
    }
    let pageSize = (() => {
      const stored = parseInt(localStorage.getItem(PAGE_SIZE_KEY), 10);
      return ALLOWED_PAGE_SIZES.includes(stored) ? stored : 50;
    })();
    pageSizeSelect.value = String(pageSize);
    let currentPage = 0;

    const rangeFromInput = document.getElementById('range-from');
    const rangeToInput = document.getElementById('range-to');
    const chartCanvas = document.getElementById('weight-chart');
    const chartEmptyEl = document.getElementById('chart-empty');
    let chart = null;

    let editingIndex = -1;
    let isSavingEdit = false;
    let silentAttempt = false;
    let currentPreset = '7d';
    const initState = { gapi: false, gis: false };

    const TOKEN_STORAGE_KEY = 'my-weight:token';

    function loadStoredToken() {
      try {
        const raw = localStorage.getItem(TOKEN_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed.token !== 'string' || typeof parsed.expiresAt !== 'number') return null;
        if (Date.now() >= parsed.expiresAt - 60_000) return null;
        return parsed.token;
      } catch { return null; }
    }

    function storeToken(token, expiresInSec) {
      try {
        localStorage.setItem(TOKEN_STORAGE_KEY, JSON.stringify({
          token,
          expiresAt: Date.now() + (expiresInSec || 3600) * 1000,
        }));
      } catch {}
    }

    function clearStoredToken() {
      try { localStorage.removeItem(TOKEN_STORAGE_KEY); } catch {}
    }

    const ICON_EDIT = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>';
    const ICON_TRASH = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>';
    const ICON_CHECK = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>';
    const ICON_CANCEL = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>';

    window.onload = () => {
      datetimeInput.value = toLocalInputValue(new Date());
      applyRangePreset(loadStoredPreset());
      initGapi();
      initGis();
    };

    function toDateInputValue(d) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function applyRangePreset(preset) {
      const now = new Date();
      const to = new Date(now);
      let from = new Date(now);
      switch (preset) {
        case '7d': from.setDate(from.getDate() - 7); break;
        case '30d': from.setDate(from.getDate() - 30); break;
        case '6m': from.setMonth(from.getMonth() - 6); break;
        case '1y': from.setFullYear(from.getFullYear() - 1); break;
        case '5y': from.setFullYear(from.getFullYear() - 5); break;
        case 'all':
          if (records.length > 0) {
            const oldest = records.reduce((min, r) => {
              const t = new Date(r.datetime).getTime();
              return t < min ? t : min;
            }, Infinity);
            from = new Date(oldest);
          } else {
            from.setFullYear(from.getFullYear() - 1);
          }
          break;
      }
      rangeFromInput.value = toDateInputValue(from);
      rangeToInput.value = toDateInputValue(to);
      currentPreset = preset;
      try { localStorage.setItem(RANGE_PRESET_KEY, preset); } catch {}
      updatePresetButtons();
    }

    function updatePresetButtons() {
      document.querySelectorAll('.range-btn').forEach(btn => {
        const active = btn.dataset.range === currentPreset;
        btn.classList.toggle('bg-blue-600', active);
        btn.classList.toggle('text-white', active);
        btn.classList.toggle('hover:bg-blue-700', active);
        btn.classList.toggle('bg-gray-200', !active);
        btn.classList.toggle('hover:bg-gray-300', !active);
      });
    }

    function toLocalInputValue(d) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function setStatus(text, tone = 'info') {
      if (!text) {
        statusEl.classList.add('hidden');
        statusEl.textContent = '';
        return;
      }
      statusEl.textContent = text;
      statusEl.className = 'text-sm mt-2 ' + (tone === 'error' ? 'text-red-600' : 'text-gray-500');
    }

    function describeDriveError(err) {
      const reason = err?.result?.error?.errors?.[0]?.reason || err?.error?.errors?.[0]?.reason;
      const message = err?.result?.error?.message || err?.error?.message || err?.message || 'neznámá chyba';
      if (reason === 'storageQuotaExceeded') {
        return 'Vaše Google úložiště je plné. Uvolněte místo na Google Drive a zkuste to znovu.';
      }
      return message;
    }

    function initGapi() {
      gapi.load('client', async () => {
        await gapi.client.init({
          discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
        });
        gapiReady = true;
        initState.gapi = true;
        checkReady();
      });
    }

    function initGis() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        ux_mode: 'popup',
        callback: (tokenResponse) => {
          const wasSilent = silentAttempt;
          silentAttempt = false;
          if (tokenResponse.error) {
            if (!wasSilent) console.error('Token error', tokenResponse);
            setStatus('');
            showSection('auth');
            return;
          }
          accessToken = tokenResponse.access_token;
          storeToken(accessToken, parseInt(tokenResponse.expires_in, 10));
          if (gapiReady) gapi.client.setToken({ access_token: accessToken });
          setStatus('');
          onSignIn();
        }
      });
      initState.gis = true;
      checkReady();
    }

    function checkReady() {
      if (initState.gapi && initState.gis) attemptAutoLogin();
    }

    function attemptAutoLogin() {
      const cached = loadStoredToken();
      if (cached) {
        accessToken = cached;
        gapi.client.setToken({ access_token: accessToken });
        onSignIn();
        return;
      }
      silentAttempt = true;
      setStatus('Přihlašuji...');
      tokenClient.requestAccessToken({ prompt: 'none' });
    }

    loginBtn.addEventListener('click', () => {
      if (!accessToken) tokenClient.requestAccessToken({});
    });

    logoutBtn.addEventListener('click', () => {
      if (accessToken) google.accounts.oauth2.revoke(accessToken);
      clearStoredToken();
      if (gapiReady) gapi.client.setToken(null);
      accessToken = null;
      records = [];
      fileId = null;
      recordsLoaded = false;
      currentPage = 0;
      editingIndex = -1;
      showSection('auth');
      historyList.innerHTML = '';
      if (chart) {
        chart.destroy();
        chart = null;
      }
      chartEmptyEl.classList.add('hidden');
      applyRangePreset(loadStoredPreset());
      setStatus('');
    });

    async function onSignIn() {
      showSection('app');
      await loadRecords();
    }

    weightForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!accessToken) {
        alert('Nejste přihlášeni.');
        return;
      }
      if (!gapiReady || !recordsLoaded) {
        alert('Data se ještě načítají, zkuste to za chvíli.');
        return;
      }
      if (editingIndex !== -1) {
        alert('Dokončete prosím úpravu záznamu.');
        return;
      }
      const local = datetimeInput.value;
      const weight = parseFloat(weightInput.value);
      if (!local || Number.isNaN(weight)) {
        alert('Vyplňte datum/čas a hmotnost.');
        return;
      }
      const dt = new Date(local);
      if (Number.isNaN(dt.getTime())) {
        alert('Neplatné datum/čas.');
        return;
      }
      if (dt.getTime() > Date.now()) {
        if (!confirm('Datum a čas záznamu je v budoucnosti. Opravdu uložit?')) return;
      }
      await saveRecord({ datetime: dt.toISOString(), weight });
    });

    async function findAppDataFile() {
      const res = await gapi.client.drive.files.list({
        spaces: 'appDataFolder',
        fields: 'files(id,name)',
        q: `name='${FILE_NAME}' and 'appDataFolder' in parents`
      });
      return res.result.files[0] || null;
    }

    function migrate(parsed) {
      let rawRecords;
      let migrated = false;
      if (Array.isArray(parsed)) {
        rawRecords = parsed;
        migrated = true;
      } else if (parsed && typeof parsed === 'object' && Array.isArray(parsed.records)) {
        rawRecords = parsed.records;
        if (parsed.version !== SCHEMA_VERSION) migrated = true;
      } else {
        rawRecords = [];
        migrated = true;
      }

      const normalized = [];
      for (const r of rawRecords) {
        if (!r || typeof r.weight !== 'number') { migrated = true; continue; }
        if (typeof r.datetime === 'string' && !Number.isNaN(new Date(r.datetime).getTime())) {
          normalized.push({ datetime: r.datetime, weight: r.weight });
          continue;
        }
        if (typeof r.date === 'string') {
          const dt = new Date(r.date + 'T12:00:00');
          if (!Number.isNaN(dt.getTime())) {
            normalized.push({ datetime: dt.toISOString(), weight: r.weight });
            migrated = true;
            continue;
          }
        }
        migrated = true;
      }
      return { records: normalized, migrated };
    }

    async function uploadRecords() {
      const payload = JSON.stringify({ version: SCHEMA_VERSION, records });
      if (fileId) {
        const updateUrl = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`;
        const res = await fetch(updateUrl, {
          method: 'PATCH',
          headers: {
            Authorization: `Bearer ${accessToken}`,
            'Content-Type': 'application/json'
          },
          body: payload
        });
        if (!res.ok) throw await res.json();
      } else {
        const metadata = { name: FILE_NAME, parents: ['appDataFolder'] };
        const createUrl = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id';
        const blob = new Blob([payload], { type: 'application/json' });
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', blob);
        const res = await fetch(createUrl, {
          method: 'POST',
          headers: { Authorization: `Bearer ${accessToken}` },
          body: form
        });
        if (!res.ok) throw await res.json();
        const created = await res.json();
        fileId = created.id;
      }
    }

    async function loadRecords() {
      setStatus('Načítám...');
      try {
        const file = await findAppDataFile();
        let needsRewrite = false;
        if (file) {
          fileId = file.id;
          const download = await gapi.client.drive.files.get({ fileId, alt: 'media' });
          const parsed = JSON.parse(download.body || 'null');
          const result = migrate(parsed);
          records = result.records;
          needsRewrite = result.migrated;
        } else {
          fileId = null;
          records = [];
        }
        recordsLoaded = true;
        renderRecords();
        renderChart();
        prefillWeightInput();
        if (needsRewrite && fileId) {
          setStatus('Aktualizuji formát dat...');
          await uploadRecords();
        }
        setStatus('');
      } catch (err) {
        console.error('Error loading records', err);
        const status = err?.status || err?.result?.error?.code;
        if (status === 401) {
          clearStoredToken();
          accessToken = null;
          if (gapiReady) gapi.client.setToken(null);
          showSection('auth');
          setStatus('Přihlášení vypršelo, přihlaste se znovu.', 'error');
          return;
        }
        setStatus('Chyba při načítání: ' + describeDriveError(err), 'error');
      }
    }

    async function saveRecord(entry) {
      submitBtn.disabled = true;
      setStatus('Ukládám...');
      records.push(entry);
      try {
        await uploadRecords();
        currentPage = 0;
        renderRecords();
        renderChart();
        prefillWeightInput();
        datetimeInput.value = toLocalInputValue(new Date());
        setStatus('');
      } catch (err) {
        console.error('Error saving record', err);
        records.pop();
        setStatus('Chyba při ukládání: ' + describeDriveError(err), 'error');
      } finally {
        submitBtn.disabled = false;
      }
    }

    async function wipeAllData() {
      if (!confirm('Opravdu chcete smazat VŠECHNA data o vaší váze? Tuto akci nelze vrátit zpět.')) return;
      submitBtn.disabled = true;
      wipeBtn.disabled = true;
      setStatus('Mažu data...');
      try {
        if (fileId) {
          await gapi.client.drive.files.delete({ fileId });
        }
        fileId = null;
        records = [];
        currentPage = 0;
        editingIndex = -1;
        renderRecords();
        renderChart();
        prefillWeightInput();
        setStatus('Data byla smazána.');
      } catch (err) {
        console.error('Error wiping data', err);
        setStatus('Chyba při mazání: ' + describeDriveError(err), 'error');
      } finally {
        submitBtn.disabled = false;
        wipeBtn.disabled = false;
      }
    }

    wipeBtn.addEventListener('click', wipeAllData);

    function formatCzechDateTime(d) {
      const mm = String(d.getMinutes()).padStart(2, '0');
      return `${d.getDate()}.${d.getMonth() + 1}.${d.getFullYear()} ${d.getHours()}:${mm}`;
    }

    function prefillWeightInput() {
      const valid = records.filter(r => r && typeof r.weight === 'number' && typeof r.datetime === 'string' && !Number.isNaN(new Date(r.datetime).getTime()));
      if (valid.length === 0) {
        weightInput.value = '';
        return;
      }
      const newest = valid.reduce((m, r) => new Date(r.datetime) > new Date(m.datetime) ? r : m);
      weightInput.value = String(newest.weight);
    }

    function renderRecords() {
      historyList.innerHTML = '';
      if (records.length === 0) {
        const li = document.createElement('li');
        li.className = 'p-2 text-gray-500';
        li.textContent = 'Žádné záznamy k zobrazení.';
        historyList.appendChild(li);
        paginationEl.classList.add('hidden');
        return;
      }
      const valid = records
        .map((r, i) => ({ r, i }))
        .filter(({ r }) => r && typeof r.datetime === 'string' && !Number.isNaN(new Date(r.datetime).getTime()));
      const sorted = valid.slice().sort((a, b) => new Date(b.r.datetime) - new Date(a.r.datetime));
      const totalPages = Math.max(1, Math.ceil(sorted.length / pageSize));
      if (currentPage >= totalPages) currentPage = totalPages - 1;
      if (currentPage < 0) currentPage = 0;
      const start = currentPage * pageSize;
      const pageItems = sorted.slice(start, start + pageSize);
      const frag = document.createDocumentFragment();
      pageItems.forEach(({ r, i }) => frag.appendChild(buildHistoryRow(r, i)));
      historyList.appendChild(frag);

      if (sorted.length > ALLOWED_PAGE_SIZES[0]) {
        paginationEl.classList.remove('hidden');
        pageInfoEl.textContent = `${start + 1}–${start + pageItems.length} z ${sorted.length}`;
        prevPageBtn.disabled = currentPage === 0;
        nextPageBtn.disabled = currentPage >= totalPages - 1;
      } else {
        paginationEl.classList.add('hidden');
      }
    }

    function iconButton(svg, title, colorClass) {
      const b = document.createElement('button');
      b.type = 'button';
      b.title = title;
      b.className = `p-1 rounded ${colorClass}`;
      b.innerHTML = svg;
      return b;
    }

    function buildHistoryRow(r, idx) {
      const li = document.createElement('li');
      li.className = 'p-2 bg-gray-50 rounded flex items-center justify-between gap-2';
      li.dataset.idx = String(idx);

      if (idx === editingIndex) {
        const dtInput = document.createElement('input');
        dtInput.type = 'datetime-local';
        dtInput.value = toLocalInputValue(new Date(r.datetime));
        dtInput.className = 'flex-1 min-w-0 bg-white border border-gray-300 rounded px-2 py-1 text-sm shadow-sm';

        const wInput = document.createElement('input');
        wInput.type = 'number';
        wInput.step = '0.1';
        wInput.value = String(r.weight);
        wInput.className = 'w-24 bg-white border border-gray-300 rounded px-2 py-1 text-sm shadow-sm text-right';

        let actions;
        if (isSavingEdit) {
          dtInput.disabled = true;
          wInput.disabled = true;
          actions = document.createElement('span');
          actions.className = 'text-sm text-gray-500 px-2 shrink-0 whitespace-nowrap';
          actions.textContent = 'Ukládám...';
        } else {
          const saveBtn = iconButton(ICON_CHECK, 'Uložit', 'text-green-600 hover:bg-green-50');
          saveBtn.addEventListener('click', () => saveEdit(idx, dtInput.value, wInput.value));

          const cancelBtn = iconButton(ICON_CANCEL, 'Zrušit', 'text-gray-500 hover:bg-gray-200');
          cancelBtn.addEventListener('click', () => { editingIndex = -1; renderRecords(); });

          [dtInput, wInput].forEach(inp => {
            inp.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') { e.preventDefault(); saveBtn.click(); }
              else if (e.key === 'Escape') { e.preventDefault(); cancelBtn.click(); }
            });
          });

          actions = document.createElement('div');
          actions.className = 'flex gap-1 shrink-0';
          actions.append(saveBtn, cancelBtn);
          setTimeout(() => wInput.focus(), 0);
        }

        li.append(dtInput, wInput, actions);
      } else {
        const dateSpan = document.createElement('span');
        dateSpan.className = 'flex-1';
        dateSpan.textContent = formatCzechDateTime(new Date(r.datetime));

        const weightSpan = document.createElement('span');
        weightSpan.className = 'tabular-nums font-medium text-right min-w-[5rem]';
        weightSpan.textContent = `${r.weight} kg`;

        const actions = document.createElement('div');
        actions.className = 'flex gap-1 shrink-0';

        if (editingIndex === -1) {
          const editBtn = iconButton(ICON_EDIT, 'Upravit', 'text-gray-500 hover:bg-blue-50 hover:text-blue-600');
          editBtn.addEventListener('click', () => { editingIndex = idx; renderRecords(); });

          const delBtn = iconButton(ICON_TRASH, 'Smazat', 'text-gray-500 hover:bg-red-50 hover:text-red-600');
          delBtn.addEventListener('click', () => deleteRecord(idx));

          actions.append(editBtn, delBtn);
        }

        li.append(dateSpan, weightSpan, actions);
      }
      return li;
    }

    async function deleteRecord(idx) {
      if (idx < 0 || idx >= records.length) return;
      const r = records[idx];
      if (!r) return;
      const label = r.datetime && !Number.isNaN(new Date(r.datetime).getTime())
        ? `${formatCzechDateTime(new Date(r.datetime))} (${r.weight} kg)`
        : `záznam ${idx}`;
      if (!confirm(`Smazat ${label}?`)) return;
      const removed = records.splice(idx, 1)[0];
      submitBtn.disabled = true;
      wipeBtn.disabled = true;
      setStatus('Mažu záznam...');
      try {
        await uploadRecords();
        renderRecords();
        renderChart();
        prefillWeightInput();
        setStatus('');
      } catch (err) {
        console.error('Error deleting record', err);
        records.splice(idx, 0, removed);
        renderRecords();
        setStatus('Chyba při mazání: ' + describeDriveError(err), 'error');
      } finally {
        submitBtn.disabled = false;
        wipeBtn.disabled = false;
      }
    }

    async function saveEdit(idx, dtValue, weightValue) {
      if (idx < 0 || idx >= records.length) return;
      if (!dtValue) { alert('Vyplňte datum/čas.'); return; }
      const dt = new Date(dtValue);
      if (Number.isNaN(dt.getTime())) { alert('Neplatné datum/čas.'); return; }
      const w = parseFloat(weightValue);
      if (Number.isNaN(w)) { alert('Neplatná hmotnost.'); return; }
      const original = records[idx];
      records[idx] = { datetime: dt.toISOString(), weight: w };
      isSavingEdit = true;
      renderRecords();
      submitBtn.disabled = true;
      wipeBtn.disabled = true;
      try {
        await uploadRecords();
        isSavingEdit = false;
        editingIndex = -1;
        renderRecords();
        renderChart();
        prefillWeightInput();
      } catch (err) {
        console.error('Error editing record', err);
        records[idx] = original;
        isSavingEdit = false;
        renderRecords();
        const failedLi = historyList.querySelector(`li[data-idx="${idx}"]`);
        if (failedLi) {
          const inps = failedLi.querySelectorAll('input');
          if (inps.length >= 2) {
            inps[0].value = dtValue;
            inps[1].value = weightValue;
            inps[1].focus();
          }
        }
        alert('Chyba při ukládání: ' + describeDriveError(err));
      } finally {
        submitBtn.disabled = false;
        wipeBtn.disabled = false;
      }
    }

    pageSizeSelect.addEventListener('change', () => {
      const next = parseInt(pageSizeSelect.value, 10);
      if (!ALLOWED_PAGE_SIZES.includes(next)) return;
      pageSize = next;
      localStorage.setItem(PAGE_SIZE_KEY, String(pageSize));
      currentPage = 0;
      renderRecords();
      historyList.scrollTop = 0;
    });

    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        applyRangePreset(btn.dataset.range);
        renderChart();
      });
    });

    rangeFromInput.addEventListener('change', () => {
      currentPreset = null;
      updatePresetButtons();
      renderChart();
    });
    rangeToInput.addEventListener('change', () => {
      currentPreset = null;
      updatePresetButtons();
      renderChart();
    });

    function renderChart() {
      if (typeof Chart === 'undefined') return;
      const fromVal = rangeFromInput.value;
      const toVal = rangeToInput.value;
      const fromTs = fromVal ? new Date(fromVal + 'T00:00:00').getTime() : -Infinity;
      const toTs = toVal ? new Date(toVal + 'T23:59:59.999').getTime() : Infinity;

      const allPoints = records
        .map(r => ({ x: r && typeof r.datetime === 'string' ? new Date(r.datetime).getTime() : NaN, y: r ? r.weight : NaN }))
        .filter(p => !Number.isNaN(p.x) && !Number.isNaN(p.y))
        .sort((a, b) => a.x - b.x);

      const inRange = allPoints.filter(p => p.x >= fromTs && p.x <= toTs);
      let chartPoints = inRange;
      if (inRange.length > 0) {
        let before = null;
        let after = null;
        for (const p of allPoints) {
          if (p.x < fromTs) before = p;
          else if (p.x > toTs) { after = p; break; }
        }
        chartPoints = [
          ...(before ? [before] : []),
          ...inRange,
          ...(after ? [after] : []),
        ];
      }

      if (inRange.length === 0) {
        chartEmptyEl.classList.remove('hidden');
      } else {
        chartEmptyEl.classList.add('hidden');
      }

      const data = {
        datasets: [{
          label: 'Hmotnost (kg)',
          data: chartPoints,
          borderColor: '#16a34a',
          backgroundColor: 'rgba(22, 163, 74, 0.1)',
          tension: 0.2,
          pointRadius: chartPoints.length > 200 ? 0 : 3,
          spanGaps: true,
        }]
      };

      if (chart) {
        chart.data = data;
        chart.options.scales.x.min = isFinite(fromTs) ? fromTs : undefined;
        chart.options.scales.x.max = isFinite(toTs) ? toTs : undefined;
        chart.update();
        return;
      }

      chart = new Chart(chartCanvas, {
        type: 'line',
        data,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              type: 'time',
              min: isFinite(fromTs) ? fromTs : undefined,
              max: isFinite(toTs) ? toTs : undefined,
              time: { tooltipFormat: 'PPp' }
            },
            y: { title: { display: true, text: 'kg' } }
          }
        }
      });
    }

    prevPageBtn.addEventListener('click', () => {
      if (currentPage > 0) {
        currentPage--;
        renderRecords();
        historyList.scrollTop = 0;
      }
    });

    nextPageBtn.addEventListener('click', () => {
      currentPage++;
      renderRecords();
      historyList.scrollTop = 0;
    });
  </script>
</body>
</html>
