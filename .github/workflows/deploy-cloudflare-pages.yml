name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cheap static checks — fail fast before the longer build /
      # deploy steps.
      # - htmlhint: unclosed tags, duplicate ids, invalid attribute
      #   syntax, missing title, etc. (default rules).
      # - node --check: parse-only syntax check on every inline
      #   <script> block (skipping ones with src=). Extracts each
      #   block via perl, concatenates, pipes to node which exits
      #   non-zero on the first syntax error.
      # - jq: well-formed JSON for the PWA manifest.
      - name: Validate HTML, JS, and JSON syntax
        run: |
          npx --yes htmlhint@1 public/*.html
          for f in public/*.html; do
            perl -0ne 'while (/<script(?![^>]*\bsrc=)[^>]*>(.*?)<\/script>/sg) { print "$1\n;\n"; }' "$f" \
              | node --check - \
              || { echo "::error file=$f::JS syntax error in inline <script>"; exit 1; }
          done
          for f in functions/*.js; do
            node --check "$f" \
              || { echo "::error file=$f::JS syntax error in Pages Function"; exit 1; }
          done
          jq empty public/manifest.webmanifest

      # Playwright loads public/index.html via file:// in Chromium and
      # calls top-level functions (migrate, toMinuteKey, …) via
      # page.evaluate. Covers the data-migration / schema branches that
      # the curl smoke can't reach because they're pure logic.
      - name: Set up Node for tests
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/package-lock.json') }}

      - name: Install test dependencies + browsers
        working-directory: tests
        run: |
          npm ci
          # Idempotent: system apt deps run every time (cheap if already
          # installed); binary install is a no-op when the cache restored
          # the browsers already. Cross-browser runs catch iOS-Safari
          # (webkit) and Firefox quirks that chromium alone would miss.
          npx playwright install --with-deps chromium webkit firefox

      - name: Run pure-function tests (chromium + webkit + firefox)
        working-directory: tests
        run: npx playwright test --project=unit-chromium --project=unit-webkit --project=unit-firefox

      # axe-core WCAG 2.0 / 2.1 AA scan against auth section, app
      # section, and menu overlay. Chromium-only (a11y violations
      # are DOM-content checks and don't vary by engine), runs
      # before deploy so a regression fails the workflow.
      - name: Run accessibility scan
        working-directory: tests
        run: npx playwright test --project=a11y

      # Coverage HTML is uploaded so users without a local dev env
      # can browse the per-file line/branch report straight from the
      # Actions run page. `if: always()` so a failing test still
      # publishes whatever coverage made it through. The artifact
      # name carries the run id so multiple runs don't collide.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}
          path: tests/coverage-reports/
          retention-days: 14

      # The app is static and lives in public/. To publish a new file
      # to the site, drop it in public/ — no workflow change needed.
      # When real build steps appear later, they can either emit into
      # public/ directly or assemble a separate dist/ and point the
      # deploy command at it.

      # Every asset derived from public/icon.svg is generated here:
      # the legacy /favicon.ico, the PWA manifest icons (192 / 512),
      # the iOS apple-touch-icon (180), and icon-maskable.svg (the
      # same SVG re-emitted with an extended viewBox so it fits
      # Android's 80%-diameter maskable safe circle). Cache key is
      # the hash of icon.svg, so the regen only runs when the source
      # SVG actually changes. All generated files are gitignored.
      - name: Cache generated icon files
        id: icons-cache
        uses: actions/cache@v4
        with:
          path: |
            public/favicon.ico
            public/icon-192.png
            public/icon-512.png
            public/apple-touch-icon.png
            public/icon-maskable.svg
          key: icons-${{ hashFiles('public/icon.svg', '.github/workflows/deploy-cloudflare-pages.yml') }}

      - name: Generate icon files from icon.svg
        if: steps.icons-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          pip install --quiet Pillow
          rsvg-convert -w 512 -h 512 public/icon.svg -o public/icon-512.png
          rsvg-convert -w 192 -h 192 public/icon.svg -o public/icon-192.png
          rsvg-convert -w 180 -h 180 public/icon.svg -o public/apple-touch-icon.png
          python3 -c "from PIL import Image; Image.open('public/icon-512.png').save('public/favicon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128)])"

          # icon-maskable.svg: a copy of icon.svg with the viewBox
          # extended on all sides so the rounded-rect icon fits inside
          # Android's maskable safe circle (diameter = 80% of canvas
          # side). Math: the rounded square (side 512, corner radius
          # 80) has a circumscribed-circle radius of 176*sqrt(2) + 80
          # ≈ 328.9 — that's the distance from icon center to the
          # midpoint of each corner arc, the farthest pixel. Solving
          # 328.9 = 0.4 * new_side gives new_side = 822.25; we round
          # up to 824 to leave ~0.6 unit antialiasing margin. Padding
          # is therefore (824 - 512) / 2 = 156 per side. A plain
          # rectangle would need 196 per side; the rounded corners
          # buy back ~40 units.
          #
          # A near-transparent (1% opacity) white rect is laid down
          # first across the entire extended viewBox. Without it,
          # Chrome's PWA install path trims any fully-transparent
          # padding from a purpose:"any" icon — losing the safe-zone
          # margin we just added. 1% opacity is invisible to the eye
          # (8-bit alpha ≈ 2/255) but every pixel reads as non-zero
          # alpha, so the trim heuristic keeps the padding intact.
          cp public/icon.svg public/icon-maskable.svg
          perl -i -pe '
            $count += s/viewBox="0 0 512 512"/viewBox="-156 -156 824 824"/g;
            END {
              die "expected 1 viewBox match in icon-maskable.svg, found $count\n" if $count != 1;
            }
          ' public/icon-maskable.svg
          perl -0777 -i -pe '
            $count += s|</defs>|</defs>\n  <rect x="-156" y="-156" width="824" height="824" fill="white" opacity="0.01"/>|g;
            END {
              die "expected 1 </defs> match in icon-maskable.svg, found $count\n" if $count != 1;
            }
          ' public/icon-maskable.svg

      # Compile Tailwind utilities used in public/*.html into a single
      # minified stylesheet. This replaces the @tailwindcss/browser CDN
      # runtime which caused a flash of unstyled content on hard reload
      # (the runtime scans the DOM and injects styles after parse).
      # Uses the standalone binary from tailwindlabs/tailwindcss releases:
      # self-contained, no node_modules or @import-resolver hassle that
      # the npm CLI flavour has when there's no local package.json.
      - name: Build Tailwind CSS
        run: |
          curl -fsSL -o /tmp/tailwindcss https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x /tmp/tailwindcss
          /tmp/tailwindcss -i src/tailwind.css -o public/tailwind.css --minify

      # The header logo is authored as a normal <img> tag with a
      # data-inline-svg marker; this step swaps that <img> for the
      # actual icon.svg contents so the in-page JS can manipulate the
      # 7-segment elements directly. Exact-one match required — an
      # accidental second occurrence (e.g. example markup in prose)
      # fails loudly instead of silently rewriting the wrong place.
      # Implementation lives in scripts/inline-svg.mjs so tests can
      # import the same function without duplicating the rule.
      - name: Inline icon.svg into index.html
        run: node scripts/inline-svg.mjs public/index.html public/icon.svg

      # Stamp the build SHA + timestamp into window.__BUILD so the
      # About dialog can display them. Source HTML carries the
      # literal placeholders __BUILD_SHA__ / __BUILD_DATE__; we
      # require exactly one substitution of each so a missing
      # placeholder or accidental duplicate fails the build.
      - name: Inject build metadata
        working-directory: public
        run: |
          sha=$(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD)
          date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          perl -i -pe '
            $sha_count += s/__BUILD_SHA__/'"$sha"'/g;
            $date_count += s/__BUILD_DATE__/'"$date"'/g;
            END {
              die "expected 1 __BUILD_SHA__, found $sha_count\n" if $sha_count != 1;
              die "expected 1 __BUILD_DATE__, found $date_count\n" if $date_count != 1;
            }
          ' index.html

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=my-weight --branch=${{ github.ref_name }}

      # Pull the deployed HTML back over the wire and assert that the
      # build-time transformations actually took effect: build-info
      # placeholders replaced with real values, SVG inlined (no
      # leftover <img data-inline-svg>, inlined <svg id="logo">
      # present), and every referenced static asset responds 200.
      # Uses the deployment-specific URL from the wrangler action so
      # custom-domain DNS / cache propagation doesn't introduce flake.
      - name: Post-deploy smoke test
        env:
          URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          echo "Smoke-testing $URL"
          html=$(curl -fsSL "$URL/")

          grep -q '<title>Moje váha</title>' <<< "$html" \
            || { echo "::error::Missing or wrong <title> in deployed HTML"; exit 1; }

          if grep -qE '__BUILD_SHA__|__BUILD_DATE__' <<< "$html"; then
            echo "::error::Build-metadata placeholders survived in deployed HTML"
            grep -nE '__BUILD_SHA__|__BUILD_DATE__' <<< "$html" || true
            exit 1
          fi
          grep -qE "sha: '[a-f0-9]{7,}'" <<< "$html" \
            || { echo "::error::Build SHA not replaced with a hex value"; exit 1; }
          grep -qE "date: '[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9:]+Z'" <<< "$html" \
            || { echo "::error::Build date not replaced with an ISO timestamp"; exit 1; }

          if grep -qE '<img[[:space:]]+[^>]*data-inline-svg' <<< "$html"; then
            echo "::error::SVG inliner left an <img data-inline-svg> tag behind"
            exit 1
          fi
          grep -qE '<svg[^>]+id="logo"' <<< "$html" \
            || { echo "::error::Inlined <svg ... id=\"logo\"> not found in deployed HTML"; exit 1; }

          for asset in tailwind.css icon.svg icon-maskable.svg favicon.ico icon-192.png icon-512.png apple-touch-icon.png manifest.webmanifest sw.js privacy.html; do
            echo "  - $asset"
            curl -fsSL -o /dev/null "$URL/$asset" \
              || { echo "::error::Asset $asset failed to load"; exit 1; }
          done
          echo "Smoke test passed"

      # The curl smoke above only confirms the bytes serve. This step
      # opens the deployed URL in a real headless Chromium, waits for
      # the auth section to appear (proving gapi + gis loaded, the
      # inline script ran to completion, and showSection('auth')
      # fired), and asserts no console errors / pageerrors fired.
      # Catches deploy regressions the mocked unit suite can't:
      # CSP changes blocking inline scripts, CDN moves, GIS/gapi API
      # surface changes, Tailwind class regressions, etc.
      - name: Post-deploy boot check (Playwright, all browsers)
        working-directory: tests
        env:
          SMOKE_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: npx playwright test --project=smoke-chromium --project=smoke-webkit --project=smoke-firefox
