name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The app is static and lives in public/. To publish a new file
      # to the site, drop it in public/ — no workflow change needed.
      # When real build steps appear later, they can either emit into
      # public/ directly or assemble a separate dist/ and point the
      # deploy command at it.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=my-weight --branch=${{ github.ref_name }}
