name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cheap static checks — fail fast before the longer build /
      # deploy steps.
      # - htmlhint: unclosed tags, duplicate ids, invalid attribute
      #   syntax, missing title, etc. (default rules).
      # - node --check: parse-only syntax check on every inline
      #   <script> block (skipping ones with src=). Extracts each
      #   block via perl, concatenates, pipes to node which exits
      #   non-zero on the first syntax error.
      # - jq: well-formed JSON for the PWA manifest.
      - name: Validate HTML, JS, and JSON syntax
        run: |
          npx --yes htmlhint@1 public/*.html
          for f in public/*.html; do
            perl -0ne 'while (/<script(?![^>]*\bsrc=)[^>]*>(.*?)<\/script>/sg) { print "$1\n;\n"; }' "$f" \
              | node --check - \
              || { echo "::error file=$f::JS syntax error in inline <script>"; exit 1; }
          done
          jq empty public/manifest.webmanifest

      # Playwright loads public/index.html via file:// in Chromium and
      # calls top-level functions (migrate, toMinuteKey, …) via
      # page.evaluate. Covers the data-migration / schema branches that
      # the curl smoke can't reach because they're pure logic.
      - name: Set up Node for tests
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/package-lock.json') }}

      - name: Install test dependencies + browser
        working-directory: tests
        run: |
          npm ci
          # Idempotent: system apt deps run every time (cheap if already
          # installed); binary install is a no-op when the cache restored
          # the browser already.
          npx playwright install --with-deps chromium

      - name: Run pure-function tests
        working-directory: tests
        run: npx playwright test

      # The app is static and lives in public/. To publish a new file
      # to the site, drop it in public/ — no workflow change needed.
      # When real build steps appear later, they can either emit into
      # public/ directly or assemble a separate dist/ and point the
      # deploy command at it.

      # Every raster derived from public/icon.svg is generated here:
      # the legacy /favicon.ico, the PWA manifest icons (192 / 512),
      # and the iOS apple-touch-icon (180). Cache key is the hash of
      # icon.svg, so the regen only runs when the source SVG actually
      # changes. All four files are gitignored build artifacts.
      - name: Cache generated icon files
        id: icons-cache
        uses: actions/cache@v4
        with:
          path: |
            public/favicon.ico
            public/icon-192.png
            public/icon-512.png
            public/apple-touch-icon.png
          key: icons-${{ hashFiles('public/icon.svg') }}

      - name: Generate icon files from icon.svg
        if: steps.icons-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          pip install --quiet Pillow
          rsvg-convert -w 512 -h 512 public/icon.svg -o public/icon-512.png
          rsvg-convert -w 192 -h 192 public/icon.svg -o public/icon-192.png
          rsvg-convert -w 180 -h 180 public/icon.svg -o public/apple-touch-icon.png
          python3 -c "from PIL import Image; Image.open('public/icon-512.png').save('public/favicon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128)])"

      # Compile Tailwind utilities used in public/*.html into a single
      # minified stylesheet. This replaces the @tailwindcss/browser CDN
      # runtime which caused a flash of unstyled content on hard reload
      # (the runtime scans the DOM and injects styles after parse).
      # Uses the standalone binary from tailwindlabs/tailwindcss releases:
      # self-contained, no node_modules or @import-resolver hassle that
      # the npm CLI flavour has when there's no local package.json.
      - name: Build Tailwind CSS
        run: |
          curl -fsSL -o /tmp/tailwindcss https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x /tmp/tailwindcss
          /tmp/tailwindcss -i src/tailwind.css -o public/tailwind.css --minify

      # The header logo is authored as a normal <img> tag with a
      # data-inline-svg marker; this step swaps that <img> for the
      # actual icon.svg contents so the in-page JS can manipulate the
      # 7-segment elements directly. We require exactly one match per
      # HTML file so an accidental second occurrence (e.g. example
      # markup in prose) fails loudly instead of silently rewriting
      # the wrong place.
      - name: Inline icon.svg into index.html
        working-directory: public
        run: |
          perl -i -0pe '
            BEGIN { open(my $f, "<", "icon.svg") or die "icon.svg: $!"; local $/; $svg = <$f>; }
            $c += s{<img\b[^>]*\bdata-inline-svg\b[^>]*?/?>}{$svg}g;
            END { die "expected 1 <img data-inline-svg>, found $c\n" if $c != 1; }
          ' index.html

      # Stamp the build SHA + timestamp into window.__BUILD so the
      # About dialog can display them. Source HTML carries the
      # literal placeholders __BUILD_SHA__ / __BUILD_DATE__; we
      # require exactly one substitution of each so a missing
      # placeholder or accidental duplicate fails the build.
      - name: Inject build metadata
        working-directory: public
        run: |
          sha=$(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD)
          date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          perl -i -pe '
            $sha_count += s/__BUILD_SHA__/'"$sha"'/g;
            $date_count += s/__BUILD_DATE__/'"$date"'/g;
            END {
              die "expected 1 __BUILD_SHA__, found $sha_count\n" if $sha_count != 1;
              die "expected 1 __BUILD_DATE__, found $date_count\n" if $date_count != 1;
            }
          ' index.html

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=my-weight --branch=${{ github.ref_name }}

      # Pull the deployed HTML back over the wire and assert that the
      # build-time transformations actually took effect: build-info
      # placeholders replaced with real values, SVG inlined (no
      # leftover <img data-inline-svg>, inlined <svg id="logo">
      # present), and every referenced static asset responds 200.
      # Uses the deployment-specific URL from the wrangler action so
      # custom-domain DNS / cache propagation doesn't introduce flake.
      - name: Post-deploy smoke test
        env:
          URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          echo "Smoke-testing $URL"
          html=$(curl -fsSL "$URL/")

          grep -q '<title>Moje váha</title>' <<< "$html" \
            || { echo "::error::Missing or wrong <title> in deployed HTML"; exit 1; }

          if grep -qE '__BUILD_SHA__|__BUILD_DATE__' <<< "$html"; then
            echo "::error::Build-metadata placeholders survived in deployed HTML"
            grep -nE '__BUILD_SHA__|__BUILD_DATE__' <<< "$html" || true
            exit 1
          fi
          grep -qE "sha: '[a-f0-9]{7,}'" <<< "$html" \
            || { echo "::error::Build SHA not replaced with a hex value"; exit 1; }
          grep -qE "date: '[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9:]+Z'" <<< "$html" \
            || { echo "::error::Build date not replaced with an ISO timestamp"; exit 1; }

          if grep -qE '<img[[:space:]]+[^>]*data-inline-svg' <<< "$html"; then
            echo "::error::SVG inliner left an <img data-inline-svg> tag behind"
            exit 1
          fi
          grep -qE '<svg[^>]+id="logo"' <<< "$html" \
            || { echo "::error::Inlined <svg ... id=\"logo\"> not found in deployed HTML"; exit 1; }

          for asset in tailwind.css icon.svg favicon.ico icon-192.png icon-512.png apple-touch-icon.png manifest.webmanifest sw.js privacy.html; do
            echo "  - $asset"
            curl -fsSL -o /dev/null "$URL/$asset" \
              || { echo "::error::Asset $asset failed to load"; exit 1; }
          done
          echo "Smoke test passed"
