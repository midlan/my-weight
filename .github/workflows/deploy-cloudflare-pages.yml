name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The app is static and lives in public/. To publish a new file
      # to the site, drop it in public/ — no workflow change needed.
      # When real build steps appear later, they can either emit into
      # public/ directly or assemble a separate dist/ and point the
      # deploy command at it.

      # The favicon.ico is generated from public/icon.svg on cache miss.
      # Cache key is the hash of icon.svg, so the regen only runs when
      # the source SVG actually changes. The .ico is gitignored — it's
      # a build artifact, not a tracked file.
      - name: Cache generated favicon.ico
        id: favicon-cache
        uses: actions/cache@v4
        with:
          path: public/favicon.ico
          key: favicon-${{ hashFiles('public/icon.svg') }}

      - name: Generate favicon.ico from icon.svg
        if: steps.favicon-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          pip install --quiet Pillow
          rsvg-convert -w 256 -h 256 public/icon.svg -o /tmp/icon.png
          python3 -c "from PIL import Image; Image.open('/tmp/icon.png').save('public/favicon.ico', sizes=[(16,16),(32,32),(48,48)])"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=my-weight --branch=${{ github.ref_name }}
