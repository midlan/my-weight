  <!-- Content Security Policy lives in public/_headers as a real HTTP
       response header (Cloudflare Pages applies that file automatically).
       Lighthouse flagged a meta-tag CSP as weaker than a header one. -->

  <!-- Pre-built Tailwind CSS (see src/tailwind.css; built in CI). -->
  <link rel="stylesheet" href="tailwind.css" />
  <script>
    // Build metadata. The two literal placeholders are substituted by
    // the deploy workflow with the git short SHA and an ISO UTC
    // timestamp. Local serves from the source tree keep them as-is,
    // so the About dialog will show "dev" rather than fake values.
    window.__BUILD = {
      sha: '__BUILD_SHA__',
      date: '__BUILD_DATE__',
    };
  </script>
  <script>
    // Apply system dark preference synchronously, before anything renders,
    // so the first paint matches the user's OS theme. Once the saved
    // settings.theme loads from Drive, applyTheme() may override this.
    (function () {
      try {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    })();
  </script>
  <!-- Chart.js + date adapter. `defer` because the chart is only drawn
       after sign-in + Drive load, so synchronous evaluation just blocks
       first paint. window.onload waits for deferred scripts, so the
       boot path keeps working unchanged. -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js" defer></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- GAPI client for Drive -->
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <script>
    // Konfigurace
    const CLIENT_ID = '562922982244-e4ci4pc7pj3tche4dat3ra6oam17ath8.apps.googleusercontent.com';
    const SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
    const FILE_NAME = 'weight_records.json';
    const SCHEMA_VERSION = 2;

    let tokenClient;
    let accessToken = null;
    let gapiReady = false;
    // v2 storage shape: object keyed by minute-precision ISO datetime.
    // Each value is { weight, note? } — datetime lives only in the key.
    // Iterate via recordsAsList() (defined further down) which hoists the
    // datetime back into each record and sorts chronologically.
    let records = {};
    let settings = {};
    let fileId = null;
    let revisionId = null;
    let recordsLoaded = false;
    let settingsSaveTimer = null;

    function scheduleSettingsSave() {
      if (!accessToken || !recordsLoaded) return;
      if (settingsSaveTimer) clearTimeout(settingsSaveTimer);
      settingsSaveTimer = setTimeout(() => {
        settingsSaveTimer = null;
        const apply = () => {
          settings.rangePreset = currentPreset;
          if (currentTheme === 'system') {
            delete settings.theme;
          } else {
            settings.theme = currentTheme;
          }
          return true;
        };
        uploadWithConflictRetry(apply).then(({ refetched }) => {
          if (refetched) {
            // Concurrent change pulled in fresh records — show them.
            renderRecords();
            renderChart();
          }
        }).catch(err => console.error('Failed to save settings', err));
      }, 500);
    }

    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const menuBtn = document.getElementById('menu-btn');
    const menuCloseBtn = document.getElementById('menu-close-btn');
    const menuOverlay = document.getElementById('menu-overlay');
    const privacyOverlay = document.getElementById('privacy-overlay');
    const privacyCloseBtn = document.getElementById('privacy-close-btn');
    const privacyMenuBtn = document.getElementById('privacy-menu-btn');
    const privacyLoginLink = document.getElementById('privacy-login-link');
    const installBtn = document.getElementById('install-btn');
    const aboutBtn = document.getElementById('about-btn');
    // PWA install state. Chrome (desktop + Android) fires
    // beforeinstallprompt when our manifest + SW criteria are met; we
    // stash the event and use it to power the menu button and the
    // one-time first-login confirmation. iOS Safari never fires the
    // event — users there install via Share → Add to Home Screen.
    // Declared here (alongside the DOM ref) so the handler block a
    // few lines below can safely close over them.
    let deferredInstallPrompt = null;
    let recordsHaveLoadedOnce = false;
    const INSTALL_PROMPTED_KEY = 'my-weight:install-prompted';
    // sessionStorage flag — set when we hit a future schema version
    // and trigger a one-shot location.reload() to pick up fresh JS.
    // Survives only the current tab session; cleared on successful
    // load. Prevents an infinite reload loop when the server is
    // actually serving older code (e.g. intentional rollback).
    const NEWER_SCHEMA_RELOAD_KEY = 'my-weight:reloaded-for-newer-schema';
    const exportBtn = document.getElementById('export-btn');
    const importBtn = document.getElementById('import-btn');
    const importInput = document.getElementById('import-input');
    const importHelpBtn = document.getElementById('import-help-btn');
    const loadingSection = document.getElementById('loading-section');
    const loadingMessageEl = document.getElementById('loading-message');
    const authSection = document.getElementById('auth-section');
    const appSection = document.getElementById('app-section');

    let currentSection = 'loading';
    function showSection(name) {
      currentSection = name;
      loadingSection.style.display = name === 'loading' ? '' : 'none';
      authSection.style.display = name === 'auth' ? '' : 'none';
      appSection.style.display = name === 'app' ? '' : 'none';
      menuBtn.classList.toggle('hidden', name !== 'app');
    }

    menuBtn.addEventListener('click', () => {
      menuOverlay.classList.remove('hidden');
    });

    menuCloseBtn.addEventListener('click', () => {
      menuOverlay.classList.add('hidden');
    });

    const privacyContentEl = document.getElementById('privacy-modal-content');
    let privacyContentLoaded = false;
    let privacyContentPromise = null;

    function loadPrivacyContent() {
      if (privacyContentLoaded) return Promise.resolve();
      if (privacyContentPromise) return privacyContentPromise;
      privacyContentPromise = (async () => {
        try {
          const res = await fetch('privacy');
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const html = await res.text();
          const doc = new DOMParser().parseFromString(html, 'text/html');
          const source = doc.getElementById('privacy-content');

    // by tests that need a synchronous final state.
    let logoCurrentValue = null;
    function displayLogoWeight(w) {
      if (!LOGO_AVAILABLE) return;
      const clamped = Math.min(Math.max(0, w), LOGO_MAX);
      const r = Math.round(clamped * 10) / 10;
      const i = Math.floor(r);
      const dp = Math.round((r - i) * 10);
      for (let p = 0; p <= 3; p++) setLogoDigit(p, null);
      setLogoDecimal(1, false);
      setLogoDecimal(2, false);
      if (r >= 100) {
        setLogoDigit(0, Math.floor(i / 100));
        setLogoDigit(1, Math.floor((i % 100) / 10));
        setLogoDigit(2, i % 10);
        setLogoDigit(3, dp);
        setLogoDecimal(2, true);
      } else {
        const t = Math.floor(i / 10);

    //   f(t) = log(1 + 9t) / log(10), with t in [0, 1].
    //   f(0)=0, f(0.5)≈0.74, f(0.9)≈0.96, f(1)=1.
    // So the rate of change is ~10× higher at the start than at the
    // end — digits flick by quickly at first, then settle gently into
    // the final reading, mimicking a real scale's overshoot-then-relax.
    // Cancels any in-flight animation when a new target arrives. Falls
    // back to an instant paint when there's no previous value to
    // animate from (first call after page load) or the target is
    // already on screen at 0.1-kg precision.
    let logoAnimRaf = null;
    function animateLogoWeight(target) {
      if (!LOGO_AVAILABLE) return;
      if (logoAnimRaf !== null) {
        cancelAnimationFrame(logoAnimRaf);
        logoAnimRaf = null;

      const clamped = Math.min(Math.max(0, target), LOGO_MAX);
      const targetR = Math.round(clamped * 10) / 10;

      const delta = targetR - startR;

      // change isn't instantaneous and a 50 kg import doesn't drag
      // on. ~500 ms for ±0.5, ~900 ms for ±2, capped near 1.4 s.
      const duration = Math.min(
        1400,
        350 + Math.log10(1 + Math.abs(delta) * 4) * 600

      const LN_K = Math.log(K);
      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);

        if (t < 1) {

        case '30d': from.setDate(from.getDate() - 30); break;
        case '3m': from.setMonth(from.getMonth() - 3); break;
        case '6m': from.setMonth(from.getMonth() - 6); break;
        case '1y': from.setFullYear(from.getFullYear() - 1); break;
        case 'all':
          if (recordsCount() > 0) {
            const oldest = Object.keys(records).reduce((min, key) => {
              const t = new Date(key).getTime();
              return t < min ? t : min;
            }, Infinity);
            from = new Date(oldest);
          } else {
            from.setFullYear(from.getFullYear() - 1);
          }
          break;
      }
      rangeFromInput.value = toDateInputValue(from);
      rangeToInput.value = toDateInputValue(to);
      currentPreset = preset;
      updatePresetButtons();
    }

    function updatePresetButtons() {
      document.querySelectorAll('.range-btn').forEach(btn => {
        const active = btn.dataset.range === currentPreset;
        btn.classList.toggle('bg-blue-600', active);
        btn.classList.toggle('dark:bg-blue-600', active);
        btn.classList.toggle('text-white', active);
        btn.classList.toggle('dark:text-white', active);
        btn.classList.toggle('hover:bg-blue-700', active);
        btn.classList.toggle('dark:hover:bg-blue-700', active);
        btn.classList.toggle('bg-gray-200', !active);
        btn.classList.toggle('dark:bg-gray-800', !active);
        btn.classList.toggle('text-gray-700', !active);
        btn.classList.toggle('dark:text-gray-200', !active);
        btn.classList.toggle('hover:bg-gray-300', !active);
        btn.classList.toggle('dark:hover:bg-gray-700', !active);
      });
    }

    function toLocalInputValue(d) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function describeDriveError(err) {
      const reason = err?.result?.error?.errors?.[0]?.reason || err?.error?.errors?.[0]?.reason;
      const message = err?.result?.error?.message || err?.error?.message || err?.message || 'neznámá chyba';
      if (reason === 'storageQuotaExceeded') {
        return 'Vaše Google úložiště je plné. Uvolněte místo na Google Drive a zkuste to znovu.';
      }
      return message;
    }

    function initGapi() {
      gapi.load('client', async () => {
        await gapi.client.init({
          discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
        });
        gapiReady = true;
        initState.gapi = true;
        checkReady();
      });
    }

    function initGis() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        ux_mode: 'popup',
        callback: (tokenResponse) => {
          if (pendingSilentReauth) {
            const state = pendingSilentReauth;
            pendingSilentReauth = null;
            clearTimeout(state.timeoutId);
            if (tokenResponse.error) {
              state.reject(new Error(tokenResponse.error));
              return;
            }
            accessToken = tokenResponse.access_token;
            storeToken(accessToken, parseInt(tokenResponse.expires_in, 10));
            if (gapiReady) gapi.client.setToken({ access_token: accessToken });
            state.resolve();
            return;
          }
          const wasSilent = silentAttempt;
          clearSilentState();
          if (tokenResponse.error) {
            if (!wasSilent) console.error('Token error', tokenResponse);
            showSection('auth');
            return;
          }
          accessToken = tokenResponse.access_token;
          storeToken(accessToken, parseInt(tokenResponse.expires_in, 10));
          if (gapiReady) gapi.client.setToken({ access_token: accessToken });
          onSignIn();
        },
        error_callback: (err) => {
          if (pendingSilentReauth) {
            const state = pendingSilentReauth;
            pendingSilentReauth = null;
            clearTimeout(state.timeoutId);
            state.reject(err || new Error('Silent re-auth failed'));
            return;
          }
          console.warn('Token client error', err);
          clearSilentState();
          showSection('auth');
        }
      });
      initState.gis = true;
      checkReady();
    }

    function checkReady() {
      if (initState.gapi && initState.gis) attemptAutoLogin();
    }

    function attemptAutoLogin() {
      const cached = loadStoredToken();
      if (cached) {
        accessToken = cached;
        gapi.client.setToken({ access_token: accessToken });
        onSignIn();
        return;
      }
      if (!hasStoredTokenRecord()) {
        // First visit (or fresh incognito) — no evidence the user has
        // signed in here before. Skip the silent token request: without
        // a user gesture and with third-party cookies often blocked,
        // it ends up triggering a blocked-popup warning. Show the
        // login button and let the next click open a normal popup.
        showSection('auth');
        return;
      }
      silentAttempt = true;
      silentTimeoutId = setTimeout(() => {
        if (!silentAttempt) return;
        console.warn('Silent token request timed out (likely a blocked popup)');
        clearSilentState();
        showSection('auth');
      }, 8000);
      tokenClient.requestAccessToken({ prompt: 'none' });
    }

    loginBtn.addEventListener('click', () => {
      if (!accessToken) tokenClient.requestAccessToken({});
    });

    logoutBtn.addEventListener('click', () => {
      menuOverlay.classList.add('hidden');
      if (accessToken) google.accounts.oauth2.revoke(accessToken);
      clearStoredToken();
      if (gapiReady) gapi.client.setToken(null);
      accessToken = null;
      records = {};
      settings = {};
      fileId = null;
      revisionId = null;
      recordsLoaded = false;
      currentPage = 0;
      editingKey = '';
      resetToNowMode();
      showSection('auth');
      historyList.innerHTML = '';
      if (chart) {
        chart.destroy();
        chart = null;
      }
      chartEmptyEl.classList.add('hidden');
      applyRangePreset(effectivePreset());
      currentTheme = effectiveTheme();
      applyTheme(currentTheme);
      // renderChart isn't called on logout (chart was destroyed), so the
      // logo would otherwise still show the prior user's weight.
      updateLogoFromLatest();
    });

    async function onSignIn() {
      showLoading();
      await loadRecords();
    }

    weightForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (submitBtn.disabled) return;
      submitBtn.disabled = true;
      try {
        if (!accessToken) {
          alert('Nejste přihlášeni.');
          return;
        }
        if (!gapiReady || !recordsLoaded) {
          alert('Data se ještě načítají, zkuste to za chvíli.');
          return;
        }
        if (editingKey) {
          alert('Dokončete prosím úpravu záznamu.');
          return;
        }
        const weight = parseFloat(weightInput.value);
        if (Number.isNaN(weight)) {
          alert('Vyplňte hmotnost.');
          return;
        }
        let datetimeIso;
        if (nowMode) {
          datetimeIso = new Date().toISOString();
        } else {
          const local = datetimeInput.value;
          if (!local) {
            alert('Vyplňte datum/čas.');
            return;
          }
          const dt = new Date(local);
          if (Number.isNaN(dt.getTime())) {
            alert('Neplatné datum/čas.');
            return;
          }
          if (dt.getTime() > Date.now()) {
            if (!confirm('Datum a čas záznamu je v budoucnosti. Opravdu uložit?')) return;
          }
          datetimeIso = dt.toISOString();
        }
        if (findDuplicateRecord(datetimeIso)) {
          alert(`Záznam s tímto datem a časem již existuje (${formatDateTime(new Date(datetimeIso))}).`);
          return;
        }
        const note = noteInput.value.trim();
        const entry = { datetime: datetimeIso, weight };
        if (note) entry.note = note;
        await saveRecord(entry);
      } finally {
        submitBtn.disabled = false;
      }
    });

    async function findAppDataFile() {
      const res = await withReauth(() => gapi.client.drive.files.list({
        spaces: 'appDataFolder',
        fields: 'files(id,name,headRevisionId)',
        q: `name='${FILE_NAME}' and 'appDataFolder' in parents`
      }));
      return res.result.files[0] || null;
    }

    async function fetchFromDrive() {
      const file = await findAppDataFile();
      if (!file) {
        fileId = null;
        revisionId = null;
        records = {};
        settings = {};
        return { exists: false, migrated: false, raw: '' };
      }
      fileId = file.id;
      revisionId = file.headRevisionId || null;
      const download = await withReauth(() => gapi.client.drive.files.get({ fileId, alt: 'media' }));
      const raw = download.body || '';
      const parsed = JSON.parse(raw || 'null');
      const result = migrate(parsed);
      records = result.records;
      settings = result.settings;
      return { exists: true, migrated: result.migrated, unrecognized: !!result.unrecognized, raw };
    }

    // Refetch content for an already-known fileId. Skips the list query
    // since we already have the id, so a conflict-resolution path can
    // do exactly 1 GET (content) instead of 2 (list + content). The
    // caller is responsible for setting revisionId — typically reusing
    // the value just observed by the pre-flight metadata GET.
    async function fetchContentByFileId() {
      const download = await withReauth(() => gapi.client.drive.files.get({ fileId, alt: 'media' }));
      const parsed = JSON.parse(download.body || 'null');
      const result = migrate(parsed);
      records = result.records;
      settings = result.settings;
    }

    // Normalize whatever shape `parsed` is in into the current v2 object:
    //   { records: { "<minute-key>": { weight, note? }, ... }, settings, migrated }
    // Migration sources handled, in order of preference:
    //   - v2 envelope  ({ version: 2, records: {<key>: {...}} }) — fast path, no rewrite
    //   - v1 envelope  ({ version: 1, records: [{datetime, weight, note?}] })
    //   - bare array   ([{datetime, weight, note?}]) — pre-versioning legacy
    //   - per-record `{date: "YYYY-MM-DD"}` legacy → noon UTC ISO
    // `migrated` flips true whenever the on-disk shape doesn't match v2
    // exactly, so loadRecords() will trigger a one-shot rewrite of the file.
    //
    // If we encounter a *future* schema version (parsed.version > SCHEMA_VERSION),
    // this JS is older than the data — typically a stale tab or cached
    // bundle. `source: 'load'` (default) reloads the page once to pick up
    // fresh JS; `source: 'import'` just throws so a user-initiated import
    // fails loudly without unexpectedly refreshing the page.
    function migrate(parsed, opts = {}) {
      const source = opts.source || 'load';
      if (parsed && typeof parsed === 'object'
          && typeof parsed.version === 'number'
          && parsed.version > SCHEMA_VERSION) {
        if (source === 'load') {
          let alreadyReloaded = false;
          try { alreadyReloaded = !!sessionStorage.getItem(NEWER_SCHEMA_RELOAD_KEY); } catch {}
          if (!alreadyReloaded) {
            try { sessionStorage.setItem(NEWER_SCHEMA_RELOAD_KEY, '1'); } catch {}
            location.reload();
            // location.reload() schedules the navigation; throw to stop
            // any further processing in the meantime. The flag tells
            // caller catches to swallow the error silently — the page
            // is about to unload, no point alerting.
            const reloadErr = new Error('Reloading to pick up newer schema');
            reloadErr.isReloadPending = true;
            throw reloadErr;
          }
          // We already tried reloading once and the server is still
          // serving this old code. Fall through to the throw below so
          // the caller's catch path surfaces the user-visible alert.
        }
        const err = new Error(`Soubor používá novější verzi formátu (verze ${parsed.version}); tato verze aplikace ji nezná.`);
        err.newerSchemaVersion = parsed.version;
        throw err;
      }
      // Recognized version — clear the reload flag so a future
      // encounter starts with a fresh attempt.
      try { sessionStorage.removeItem(NEWER_SCHEMA_RELOAD_KEY); } catch {}

      let parsedSettings = {};
      let migrated = false;
      const recordsOut = {};

      const ingestRecord = (datetimeIso, weight, note) => {
        const key = toMinuteKey(datetimeIso);
        if (!key) { migrated = true; return; }
        if (recordsOut[key]) migrated = true;  // duplicate at the same minute — last write wins
        const value = { weight };
        if (note) value.note = note;
        recordsOut[key] = value;
      };

      // True when the input *looked like* it had record data we could
      // not extract — used at the end to flag unrecognized files so
      // loadRecords offers the user a backup-and-reset recovery flow
      // instead of silently overwriting with an empty envelope.
      let inputHadContent = false;

      let inputRecords;
      let inputIsObject = false;
      if (Array.isArray(parsed)) {
        inputRecords = parsed;
        inputHadContent = parsed.length > 0;
        migrated = true;
      } else if (parsed && typeof parsed === 'object' && Array.isArray(parsed.records)) {
        // v1 envelope (or any earlier envelope that used an array).
        inputRecords = parsed.records;
        inputHadContent = parsed.records.length > 0;
        if (parsed.version !== SCHEMA_VERSION) migrated = true;
        if (parsed.settings && typeof parsed.settings === 'object' && !Array.isArray(parsed.settings)) {
          parsedSettings = parsed.settings;
        }
      } else if (parsed && typeof parsed === 'object'
                 && parsed.records && typeof parsed.records === 'object'
                 && !Array.isArray(parsed.records)) {
        // v2 envelope.
        inputRecords = parsed.records;
        inputIsObject = true;
        inputHadContent = Object.keys(parsed.records).length > 0;
        if (parsed.version !== SCHEMA_VERSION) migrated = true;
        if (parsed.settings && typeof parsed.settings === 'object' && !Array.isArray(parsed.settings)) {
          parsedSettings = parsed.settings;
        }
      } else {
        inputRecords = [];
        migrated = true;
        // Unrecognized object shapes (e.g. `{records: "garbage"}`, or
        // bare primitives that aren't null/undefined) suggest data we
        // can't read. null / undefined / `{}` are treated as genuinely
        // empty and rewritten cleanly.
        if (parsed !== null && parsed !== undefined
            && (typeof parsed !== 'object' || Object.keys(parsed).length > 0)) {
          inputHadContent = true;
        }
      }

      if (inputIsObject) {
        for (const [datetimeIso, r] of Object.entries(inputRecords)) {
          if (!r || typeof r.weight !== 'number') { migrated = true; continue; }
          const note = (typeof r.note === 'string' && r.note.length > 0) ? r.note : null;
          // The key itself is the canonical datetime; ingestRecord
          // re-normalizes via toMinuteKey to guard against any drift.
          const normalizedKey = toMinuteKey(datetimeIso);
          if (!normalizedKey) { migrated = true; continue; }
          if (normalizedKey !== datetimeIso) migrated = true;
          ingestRecord(datetimeIso, r.weight, note);
        }
      } else {
        for (const r of inputRecords) {
          if (!r || typeof r.weight !== 'number') { migrated = true; continue; }
          const note = (typeof r.note === 'string' && r.note.length > 0) ? r.note : null;
          if (typeof r.datetime === 'string' && !Number.isNaN(new Date(r.datetime).getTime())) {
            ingestRecord(r.datetime, r.weight, note);
            continue;
          }
          if (typeof r.date === 'string') {
            const dt = new Date(r.date + 'T12:00:00');
            if (!Number.isNaN(dt.getTime())) {
              ingestRecord(dt.toISOString(), r.weight, note);
              migrated = true;
              continue;
            }
          }
          migrated = true;
        }
      }

      // We saw something that looked like data but couldn't extract a
      // single valid record. Flag it so loadRecords can show the
      // backup-and-reset prompt instead of silently overwriting.
      const unrecognized = inputHadContent && Object.keys(recordsOut).length === 0;
      if (unrecognized) migrated = false;  // don't rewrite blindly

      return { records: recordsOut, settings: parsedSettings, migrated, unrecognized };
    }

    function buildUploadError(res, body) {
      const err = new Error(body?.error?.message || `HTTP ${res.status}`);
      err.status = res.status;
      err.error = body?.error;
      err.result = { error: body?.error };
      return err;
    }

    async function uploadRecords() {
      const payload = JSON.stringify({ version: SCHEMA_VERSION, records, settings });
      if (fileId) {
        const updateUrl = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media&fields=id,headRevisionId`;
        // Headers (esp. Authorization) are rebuilt inside the lambda so a
        // post-401 retry picks up the fresh access token.
        const updated = await withReauth(async () => {
          const res = await fetch(updateUrl, {
            method: 'PATCH',
            headers: {
              Authorization: `Bearer ${accessToken}`,
              'Content-Type': 'application/json'
            },
            body: payload
          });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw buildUploadError(res, body);
          }
          return res.json();
        });
        revisionId = updated.headRevisionId || null;
      } else {
        const metadata = { name: FILE_NAME, parents: ['appDataFolder'] };
        const createUrl = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,headRevisionId';
        const created = await withReauth(async () => {
          const form = new FormData();
          form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
          form.append('file', new Blob([payload], { type: 'application/json' }));
          const res = await fetch(createUrl, {
            method: 'POST',
            headers: { Authorization: `Bearer ${accessToken}` },
            body: form
          });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw buildUploadError(res, body);
          }
          return res.json();
        });
        fileId = created.id;
        revisionId = created.headRevisionId || null;
      }
    }

    // Drive API v3 ignores the If-Match header, so we implement optimistic
    // concurrency manually: before each PATCH, fetch only the headRevisionId
    // and compare with what we cached on load. Any mismatch (or 404 if the
    // file was deleted) means another device wrote to the file, so we refetch
    // its content and re-run the user's intent on the fresh state.
    async function readRemoteRevision() {
      if (!fileId) return null;
      try {
        const res = await withReauth(() => gapi.client.drive.files.get({
          fileId,
          fields: 'headRevisionId'
        }));
        return res.result?.headRevisionId || null;
      } catch (err) {
        const status = err?.status || err?.result?.error?.code;
        if (status === 404) return null;
        throw err;
      }
    }

    // Wraps uploadRecords() with optimistic-concurrency conflict handling.
    // applyIntent() mutates records/settings deterministically and returns
    // false when the user's intent is no longer applicable on the freshly-
    // loaded state (e.g. the record being edited was deleted on another
    // device, or the new datetime is now taken).
    //
    // Network cost:
    //   no file yet (first save) : POST                        (1 req)
    //   no conflict              : GET headRevisionId, PATCH   (2 req)
    //   conflict resolved        : GET headRevisionId,
    //                              GET alt=media,
    //                              PATCH                       (3 req)
    //
    // We skip a second pre-flight after refetch because we just observed
    // the current revisionId — there's nothing newer to check against
    // (Drive's PATCH ignores If-Match either way).
    async function uploadWithConflictRetry(applyIntent) {
      let refetched = false;
      if (fileId) {
        const remoteRev = await readRemoteRevision();
        if (remoteRev !== revisionId) {
          if (remoteRev === null) {
            // File deleted on another device; treat as starting from empty.
            fileId = null;
            revisionId = null;
            records = {};
            settings = {};
          } else {
            await fetchContentByFileId();
            revisionId = remoteRev;
          }
          refetched = true;
          const cont = applyIntent();
          if (!cont) return { success: false, refetched: true };
        }
      }
      await uploadRecords();
      return { success: true, refetched };
    }

    async function loadRecords() {
      try {
        const result = await fetchFromDrive();
        recordsLoaded = true;
        if (result.unrecognized) {
          // The file exists and is valid JSON, but migrate() couldn't
          // extract a single record from it (corruption, mid-write,
          // manual edit gone wrong, …). Don't silently overwrite it
          // — let the user grab a copy of the raw bytes first.
          const proceed = confirm(
            'Aplikace nemohla přečíst data ze souboru — formát není rozpoznán nebo soubor je poškozený.\n\n'
            + 'Kliknutím na OK se stáhne záloha původního souboru a obsah na Google Drive se vymaže, abyste mohli pokračovat s prázdným seznamem.\n\n'
            + 'Kliknutím na Zrušit aplikace zůstane nedostupná dokud soubor neopravíte ručně přes Google Drive (a stránku poté obnovíte).'
          );
          if (proceed) {
            downloadJsonText(result.raw);
            records = {};
            settings = {};
            try { await uploadRecords(); } catch (e) { console.warn('Post-recovery reset upload failed', e); }
          } else {
            // Stay on the loading section with a clear stuck-state
            // message; reload after manual repair re-runs the load.
            showLoading('Aplikace nemohla přečíst data. Po opravě souboru na Google Drive obnovte stránku.');
            return;
          }
        } else if (result.migrated && fileId) {
          // Best-effort rewrite of legacy data into the canonical envelope.
          // A 412 here would mean another device wrote concurrently — drop it
          // silently; the rewrite will be retried on the next load.
          try { await uploadRecords(); } catch (e) { console.warn('Rewrite-on-load failed', e); }
        }
        applyRangePreset(effectivePreset());
        currentTheme = effectiveTheme();
        applyTheme(currentTheme);
        renderRecords();
        renderChart();
        showSection('app');
        recordsHaveLoadedOnce = true;
        // If beforeinstallprompt already fired before login completed,
        // ask now (otherwise the event handler will call this once the
        // event arrives).
        maybePromptInstall();
      } catch (err) {
        // Page reload is already on its way — don't disturb the user
        // with an alert in the meantime.
        if (err && err.isReloadPending) return;
        console.error('Error loading records', err);
        const status = err?.status || err?.result?.error?.code;
        if (status === 401) {
          handleFatal401();
          return;
        }
        if (!recordsLoaded) {
          records = {};
          settings = {};
          recordsLoaded = true;
        }
        applyRangePreset(effectivePreset());
        currentTheme = effectiveTheme();
        applyTheme(currentTheme);
        renderRecords();
        renderChart();
        showSection('app');
        alert('Chyba při načítání: ' + describeDriveError(err));
      }
    }

    async function saveRecord(entry) {
      const originalBtnText = submitBtn.textContent;
      submitBtn.textContent = 'Ukládám...';
      const key = toMinuteKey(entry.datetime);
      const apply = () => {
        if (records[key]) return false;
        const value = { weight: entry.weight };
        if (entry.note) value.note = entry.note;
        records[key] = value;
        return true;
      };
      apply();
      try {
        const { success } = await uploadWithConflictRetry(apply);
        if (!success) {
          renderRecords();
          renderChart();
          alert(`Záznam s tímto datem a časem byl mezitím přidán z jiného zařízení; nebyl uložen (${formatDateTime(new Date(entry.datetime))}).`);
          return;
        }
        currentPage = 0;
        // Form submitted successfully — the input value the user typed
        // now equals the newest record, so the field can resume tracking
        // future record changes (delete/edit) automatically.
        weightInputDirty = false;
        renderRecords();
        renderChart();
        noteInput.value = '';
        // Pull focus off the note so the blur handler shrinks it back
        // from rows=3 to rows=1. Without this, a save triggered via
        // the mousedown-preventDefault path leaves the note focused
        // (intentionally — that's how the click survives the layout
        // shift) and the textarea would stay expanded after each
        // save.
        noteInput.blur();
        if (!nowMode) {
          datetimeInput.value = toLocalInputValue(new Date(entry.datetime));
        }
      } catch (err) {
        console.error('Error saving record', err);
        if (err && err.isReloadPending) return;
        const status = err?.status || err?.result?.error?.code;
        if (status === 401) { handleFatal401(); return; }
        try { await fetchFromDrive(); renderRecords(); renderChart(); } catch {}
        alert('Chyba při ukládání: ' + describeDriveError(err));
      } finally {
        submitBtn.textContent = originalBtnText;
      }
    }

    async function wipeAllData() {
      const expected = 'smazat vše';
      const typed = prompt(`Pro nevratné smazání VŠECH dat napište přesně: ${expected}`);
      if (typed === null) return;
      if (typed.trim().toLowerCase() !== expected) {
        alert('Zadaný text se neshoduje, data nebyla smazána.');
        return;
      }
      showLoading('Mažu data...');
      try {
        if (fileId) {
          try {
            await withReauth(() => gapi.client.drive.files.delete({ fileId }));
          } catch (err) {
            // 404 = already deleted on another device — fine
            const status = err?.status || err?.result?.error?.code;
            if (status !== 404) throw err;
          }
        }
        fileId = null;
        revisionId = null;
        records = {};
        settings = {};
        currentPage = 0;
        editingKey = '';
        renderRecords();
        renderChart();
        showSection('app');
        alert('Data byla smazána.');
      } catch (err) {
        console.error('Error wiping data', err);
        if (err && err.isReloadPending) return;
        const status = err?.status || err?.result?.error?.code;
        if (status === 401) { handleFatal401(); return; }
        showSection('app');
        alert('Chyba při mazání: ' + describeDriveError(err));
      }
    }

    wipeBtn.addEventListener('click', () => {
      menuOverlay.classList.add('hidden');
      wipeAllData();
    });

    function downloadJsonText(text) {
      const blob = new Blob([text], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const td = new Date();
      const stamp = `${td.getFullYear()}-${String(td.getMonth() + 1).padStart(2, '0')}-${String(td.getDate()).padStart(2, '0')}`;
      const a = document.createElement('a');
      a.href = url;
      a.download = `my-weight-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function setMenuActionsBusy(busy) {
      exportBtn.disabled = busy;
      importBtn.disabled = busy;
      importHelpBtn.disabled = busy;
      privacyMenuBtn.disabled = busy;
      aboutBtn.disabled = busy;
      installBtn.disabled = busy;
      logoutBtn.disabled = busy;
      wipeBtn.disabled = busy;
    }

    exportBtn.addEventListener('click', async () => {
      // Keep the menu open and surface progress inline on the export
      // button itself; other menu actions are disabled while the
      // export is running so a half-finished click can't fire.
      const originalText = exportBtn.textContent;
      exportBtn.textContent = 'Exportuji...';
      setMenuActionsBusy(true);
      try {
        let raw;
        if (fileId) {
          // Pull the live file so the export reflects the current Drive
          // state, not just whatever this tab last saw.
          const oldRev = revisionId;
          const result = await fetchFromDrive();
          raw = result.raw;
          // Only refresh the UI if the file actually changed on Drive —
          // a same-revision refetch is a no-op for the user.
          if (revisionId !== oldRev) {
            renderRecords();
            renderChart();
          }
        } else {
          // No file yet — export the local empty envelope.
          raw = JSON.stringify({ version: SCHEMA_VERSION, records: {}, settings: {} }, null, 2);
        }
        downloadJsonText(raw);
      } catch (err) {
        console.error('Error exporting', err);
        if (err && err.isReloadPending) return;
        const status = err?.status || err?.result?.error?.code;
        if (status === 401) { handleFatal401(); return; }
        alert('Chyba při exportu: ' + describeDriveError(err));
      } finally {

        setMenuActionsBusy(false);
      }
    });

    importBtn.addEventListener('click', () => importInput.click());

    importHelpBtn.addEventListener('click', () => {
      const td = new Date();
      const todayCz = `${String(td.getDate()).padStart(2, '0')}.${String(td.getMonth() + 1).padStart(2, '0')}.${td.getFullYear()}`;
      const url = `https://www.kaloricketabulky.cz/statistic/weight/01.01.1970/${todayCz}/get?format=json`;
      prompt(
        'Jak získat data z kaloricketabulky.cz:\n\n' +
        '1. Přihlaste se na https://www.kaloricketabulky.cz\n' +
        '2. Zkopírujte URL z pole níže a otevřete ji v prohlížeči (druhé datum je dnešní).\n' +
        '3. Prohlížeč zobrazí nebo stáhne JSON soubor – uložte ho.\n' +
        '4. V tomto menu klikněte na "Importovat data" a vyberte stažený soubor.\n\n' +
        'Soubor exportovaný z této aplikace ("Exportovat data") můžete také naimportovat zpět.\n\n' +
        'URL ke zkopírování:',
        url
      );
    });

    importInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      e.target.value = '';
      if (!file) return;
      let parsed;
      try {
        parsed = JSON.parse(await file.text());
      } catch (err) {
        alert('Soubor není platný JSON.');
        return;
      }
      // incoming becomes an array of v2 [key, value] tuples ready to
      // merge into `records`. migrate() handles both my-weight envelopes
      // (v1 array, v2 object, bare-array legacy); kaloricketabulky stays
      // a flat list parsed inline.
      let incoming;
      if (parsed && typeof parsed === 'object'
          && (Array.isArray(parsed)
              || Array.isArray(parsed.records)
              || (parsed.records && typeof parsed.records === 'object'))) {
        let migrated;
        try {
          migrated = migrate(parsed, { source: 'import' });
        } catch (err) {
          alert(err.message);
          return;
        }
        incoming = Object.entries(migrated.records);
      } else if (parsed && parsed.data && Array.isArray(parsed.data.values)) {
        incoming = parsed.data.values
          .map(v => {
            if (!v || typeof v.from !== 'number') return null;
            const dt = new Date(v.from);
            const w = typeof v.value === 'number' ? v.value : parseFloat(v.value);
            if (Number.isNaN(dt.getTime()) || Number.isNaN(w)) return null;
            return [toMinuteKey(dt.toISOString()), { weight: w }];
          })
          .filter(Boolean);
      } else {
        alert('Soubor nemá rozpoznaný formát (my-weight nebo kaloricketabulky.cz).');
        return;
      }
      if (incoming.length === 0) {
        alert('Soubor neobsahuje žádné platné záznamy.');
        return;
      }
      const toAdd = [];
      const seenKeys = new Set(Object.keys(records));
      let skipped = 0;
      for (const [key, value] of incoming) {
        if (!key || seenKeys.has(key)) { skipped++; continue; }
        seenKeys.add(key);
        toAdd.push([key, value]);
      }
      if (toAdd.length === 0) {
        alert(`Všech ${incoming.length} záznamů ze souboru už existuje, nic se nepřidá.`);
        return;
      }
      const msg = skipped > 0
        ? `Naimportovat ${toAdd.length} nových záznamů? (${skipped} duplicitních bude přeskočeno.)`
        : `Naimportovat ${toAdd.length} záznamů?`;
      if (!confirm(msg)) return;
      menuOverlay.classList.add('hidden');
      showLoading('Importuji...');
      const apply = () => {
        for (const [key, value] of toAdd) {
          if (records[key]) continue; // freshly-refetched state already has it
          records[key] = value;
        }
        return true;
      };
      apply();
      try {
        await uploadWithConflictRetry(apply);
        renderRecords();
        renderChart();
        showSection('app');
        alert(`Naimportováno ${toAdd.length} záznamů.`);
      } catch (err) {
        console.error('Error importing records', err);
        if (err && err.isReloadPending) return;
        const status = err?.status || err?.result?.error?.code;
        if (status === 401) { handleFatal401(); return; }
        try { await fetchFromDrive(); } catch {}
        renderRecords();
        renderChart();
        showSection('app');
        alert('Chyba při importu: ' + describeDriveError(err));
      }
    });

    // Single Intl.DateTimeFormat instance reused for every render.
    // `undefined` locale means "use the browser's locale" — consistent
    // with the chart's tick / tooltip formatters. The output shape
    // (e.g. "13. 5. 2026 7:30" in cs-CZ vs "5/13/2026, 7:30 AM" in
    // en-US) follows whatever the user's locale dictates.
    const dateTimeFormatter = new Intl.DateTimeFormat(undefined, {
      year: 'numeric',
      month: 'numeric',
      day: 'numeric',
      hour: 'numeric',
      minute: '2-digit',
    });
    function formatDateTime(d) {
      return dateTimeFormatter.format(d);
    }

    function formatWeight(w) {
      return Number(w).toLocaleString(undefined, { maximumFractionDigits: 10 });
    }

    function readEditingRowInputs() {
      if (!editingKey) return null;
      const li = historyList.querySelector(`li[data-key="${editingKey}"]`);
      if (!li) return null;
      const fields = li.querySelectorAll('input, textarea');
      if (fields.length < 3) return null;
      return {
        dtValue: fields[0].value,
        weightValue: fields[1].value,
        noteValue: fields[2].value
      };
    }

    // True when `record`'s persisted values match the typed values
    // (datetime compared at minute precision since the form input is
    // minute-resolution; weight is exact equality; note is trimmed).
    function recordMatchesValues(record, datetimeIso, weight, note) {
      return !!record
        && toMinuteKey(record.datetime) === toMinuteKey(datetimeIso)
        && record.weight === weight
        && (record.note || '') === (note || '');
    }

    function editingRowHasChanges() {
      const inputs = readEditingRowInputs();
      if (!inputs) return false;
      const value = records[editingKey];
      if (!value) return false;
      const original = { datetime: editingKey, ...value };
      const dt = new Date(inputs.dtValue);
      if (Number.isNaN(dt.getTime())) return true; // invalid input → treat as dirty
      const w = parseFloat(inputs.weightValue);
      if (Number.isNaN(w)) return true;
      return !recordMatchesValues(original, dt.toISOString(), w, (inputs.noteValue || '').trim());
    }

    function restoreEditingDraft(draft) {
      if (!draft || !editingKey) return;
      const li = historyList.querySelector(`li[data-key="${editingKey}"]`);
      if (!li) return;
      const fields = li.querySelectorAll('input, textarea');
      if (fields.length >= 3) {
        fields[0].value = draft.dtValue;
        fields[1].value = draft.weightValue;
        fields[2].value = draft.noteValue;
      }
    }

    function wrapTooltipNote(text, maxChars) {
      const lines = [];
      for (const rawLine of String(text).split('\n')) {
        if (rawLine.length <= maxChars) { lines.push(rawLine); continue; }
        let current = '';
        for (const word of rawLine.split(/\s+/)) {
          if (!word) continue;
          if (word.length > maxChars) {
            if (current) { lines.push(current); current = ''; }
            for (let i = 0; i < word.length; i += maxChars) {
              const chunk = word.slice(i, i + maxChars);
              if (i + maxChars < word.length) lines.push(chunk);
              else current = chunk;
            }
            continue;
          }
          if (!current) current = word;
          else if ((current + ' ' + word).length <= maxChars) current += ' ' + word;
          else { lines.push(current); current = word; }
        }
        if (current) lines.push(current);
      }
      return lines;
    }

    // Canonical key used by the v2 records object. Same datetime at
    // different sub-minute precisions (e.g. nowMode's millisecond
    // timestamp vs custom mode's HH:MM:00) collapses to the same key.
    function toMinuteKey(iso) {
      if (typeof iso !== 'string') return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      d.setSeconds(0, 0);
      return d.toISOString();
    }

    // Materialize the records object as an array of records-with-datetime
    // sorted ascending by datetime. Built on demand; most renderers /
    // iterators use this so they keep the "array of records" shape they
    // were written against.
    function recordsAsList() {
      return Object.entries(records)
        .map(([datetime, r]) => ({ datetime, ...r }))
        .sort((a, b) => new Date(a.datetime) - new Date(b.datetime));
    }

    function recordsCount() {
      return Object.keys(records).length;
    }

    function findDuplicateRecord(datetimeIso, excludeKey = '') {
      const key = toMinuteKey(datetimeIso);
      if (!key) return '';
      if (key === excludeKey) return '';
      return records[key] ? key : '';
    }

    function prefillWeightInput() {
      // Dirty input == user has expressed intent; leave it alone until
      // the next successful save clears the flag.
      if (weightInputDirty) return;
      const valid = recordsAsList().filter(r => r && typeof r.weight === 'number' && typeof r.datetime === 'string' && !Number.isNaN(new Date(r.datetime).getTime()));
      if (valid.length === 0) {
        weightInput.value = '';
        return;
      }
      // recordsAsList() is sorted ascending — last element is newest.
      weightInput.value = String(valid[valid.length - 1].weight);
    }

    function renderRecords() {
      // If the record we were editing got removed (deleted on another
      // device, or by us as part of a conflict refetch) the key won't
      // resolve anymore — drop the edit-mode state cleanly.
      if (editingKey && !records[editingKey]) editingKey = '';
      historyList.innerHTML = '';
      if (recordsCount() === 0) {
        const li = document.createElement('li');
        li.className = 'p-2 text-gray-500 dark:text-gray-400';
        li.textContent = 'Žádné záznamy k zobrazení.';
        historyList.appendChild(li);
        paginationEl.classList.add('hidden');
        return;
      }
      // recordsAsList() returns ascending; reverse for newest-first display.
      const valid = recordsAsList()
        .filter(r => r && typeof r.datetime === 'string' && !Number.isNaN(new Date(r.datetime).getTime()))
        .reverse();
      const totalPages = Math.max(1, Math.ceil(valid.length / pageSize));
      if (currentPage >= totalPages) currentPage = totalPages - 1;
      if (currentPage < 0) currentPage = 0;
      const start = currentPage * pageSize;
      const pageItems = valid.slice(start, start + pageSize);
      const frag = document.createDocumentFragment();
      pageItems.forEach(r => frag.appendChild(buildHistoryRow(r)));
      historyList.appendChild(frag);

      if (valid.length > ALLOWED_PAGE_SIZES[0]) {
        paginationEl.classList.remove('hidden');
        pageInfoEl.textContent = `${start + 1}–${start + pageItems.length} z ${valid.length}`;
        prevPageBtn.disabled = currentPage === 0;
        nextPageBtn.disabled = currentPage >= totalPages - 1;
      } else {
        paginationEl.classList.add('hidden');
      }
    }

    function iconButton(svg, title, colorClass) {
      const b = document.createElement('button');
      b.type = 'button';
      b.title = title;
      b.className = `p-2 rounded ${colorClass}`;
      b.innerHTML = svg;
      return b;
    }

        wIncrement.textContent = '+';

        const wStepper = document.createElement('div');

        let actions;
        if (isSavingEdit) {
          dtInput.disabled = true;
          editNoteInput.disabled = true;
          wInput.disabled = true;
          wDecrement.disabled = true;
          wIncrement.disabled = true;
          actions = document.createElement('span');
          actions.className = 'text-sm text-gray-500 dark:text-gray-400 px-2 shrink-0 whitespace-nowrap';
          actions.textContent = 'Ukládám...';
        } else {
          const saveBtn = iconButton(ICON_CHECK, 'Uložit', 'text-green-600 dark:text-green-400 hover:bg-green-50 dark:hover:bg-green-950');
          saveBtn.addEventListener('click', () => saveEdit(key, dtInput.value, wInput.value, editNoteInput.value));

          const cancelBtn = iconButton(ICON_CANCEL, 'Zrušit', 'text-gray-500 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700');
          cancelBtn.addEventListener('click', () => { editingKey = ''; renderRecords(); });

          wDecrement.addEventListener('click', () => adjustWeight(wInput, -0.1));
          wIncrement.addEventListener('click', () => adjustWeight(wInput, 0.1));

          [dtInput, wInput].forEach(inp => {
            inp.addEventListener('keydown', (e) => {

              else if (e.key === 'Escape') { e.preventDefault(); cancelBtn.click(); }
            });

          editNoteInput.addEventListener('keydown', (e) => {

        topRow.append(dtInput, wStepper, actions);
        li.append(topRow, editNoteInput);
      } else {
        const isExpanded = !!r.note && expandedNotes.has(key);

        const dateSpan = document.createElement('span');
        dateSpan.textContent = formatDateTime(new Date(r.datetime));

        const weightSpan = document.createElement('span');
        weightSpan.className = 'tabular-nums font-medium text-right min-w-[5rem] shrink-0';
        weightSpan.textContent = `${formatWeight(r.weight)} kg`;

        const actions = document.createElement('div');
        actions.className = 'flex gap-1 shrink-0 -my-1.5 -mr-2';

          editBtn.disabled = true;
          editBtn.classList.add('opacity-50');

          const spinnerBtn = document.createElement('button');
          spinnerBtn.type = 'button';
          spinnerBtn.disabled = true;
          spinnerBtn.title = 'Mažu...';
          spinnerBtn.className = 'p-2 rounded text-red-600';
          spinnerBtn.innerHTML = '<div class="w-5 h-5 border-2 border-gray-300 dark:border-gray-600 border-t-red-600 dark:border-t-red-400 rounded-full animate-spin"></div>';

          actions.append(editBtn, spinnerBtn);
        } else {
          // Non-deleting rows always show normal edit + delete buttons,
          // regardless of whether another row is mid-delete — matches
          // the edit-save flow (other rows keep their buttons during
          // an in-flight save). The action handlers below guard against
          // concurrent actions while a delete is running.
          const editBtn = iconButton(ICON_EDIT, 'Upravit', 'text-gray-500 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-blue-950 hover:text-blue-600 dark:hover:text-blue-300');
          editBtn.addEventListener('click', () => {
            if (deletingKey) {
              alert('Probíhá mazání záznamu, počkejte prosím.');
              return;
            }
            if (editingKey && editingKey !== key) {
              if (editingRowHasChanges()) {
                const origValue = records[editingKey];
                const label = origValue
                  ? `${formatDateTime(new Date(editingKey))} (${formatWeight(origValue.weight)} kg)`
                  : '';
                alert('Nejprve uložte nebo zrušte úpravy záznamu' + (label ? ': ' + label : '') + '.');
                return;
              }
              // No changes — silently abandon current edit and switch.
            }
            editingKey = key;
            renderRecords();
          });

          const delBtn = iconButton(ICON_TRASH, 'Smazat', 'text-gray-500 dark:text-gray-300 hover:bg-red-50 dark:hover:bg-red-950 hover:text-red-600 dark:hover:text-red-300');

          actions.append(editBtn, delBtn);
        }

        const noteSpan = document.createElement('span');
        noteSpan.className = 'text-sm text-gray-600 dark:text-gray-300';
        if (r.note) {
          noteSpan.textContent = r.note;
          noteSpan.title = r.note;
        }

        const onToggle = () => {
          if (window.getSelection()?.toString()) return;
          if (expandedNotes.has(key)) expandedNotes.delete(key);
          else expandedNotes.add(key);
          renderRecords();
        };

        if (isExpanded) {
          li.className = 'p-2 bg-gray-50 dark:bg-gray-800 rounded flex flex-col gap-2';
          dateSpan.className = 'flex-1';
          noteSpan.classList.add('whitespace-pre-wrap');

          const topContent = document.createElement('div');
          topContent.className = 'flex items-center gap-2 flex-1 min-w-0';
          topContent.append(dateSpan, weightSpan);
          if (r.note) {
            topContent.style.cursor = 'pointer';
            topContent.addEventListener('click', onToggle);
            noteSpan.style.cursor = 'pointer';
            noteSpan.addEventListener('click', onToggle);
          }

          const topRow = document.createElement('div');
          topRow.className = 'flex items-center gap-2';
          topRow.append(topContent, actions);

          li.append(topRow, noteSpan);

          li.className = 'p-2 bg-gray-50 dark:bg-gray-800 rounded flex items-center gap-2';
          dateSpan.className = 'shrink-0';

          content.className = 'flex items-center gap-2 flex-1 min-w-0';
          content.append(dateSpan, noteSpan, weightSpan);
          if (r.note) {
            content.style.cursor = 'pointer';
            content.addEventListener('click', onToggle);
          }

          li.append(content, actions);
        }
      }
      return li;
    }

    async function deleteRecord(key) {
      // Refuse a second delete while one is already in flight.
      // Prevents `deletingKey` from being overwritten mid-await and
      // matches the alert the edit-button guard fires for the same
      // scenario.
      if (deletingKey) {
        alert('Probíhá mazání záznamu, počkejte prosím.');
        return;
      }
      const value = records[key];
      if (!value) return;
      const dt = new Date(key);
      const label = !Number.isNaN(dt.getTime())
        ? `${formatDateTime(dt)} (${formatWeight(value.weight)} kg)`
        : `záznam`;
      if (!confirm(`Smazat ${label}?`)) return;
      // Snapshot the typed values from another row's edit mode so the
      // delete-induced re-render doesn't wipe the user's in-progress
      // edit. They get restored after each renderRecords() below.
      const editingDraft = (editingKey && editingKey !== key) ? readEditingRowInputs() : null;
      const apply = () => {
        delete records[key];
        return true; // idempotent — already-gone is also success
      };
      deletingKey = key;
      submitBtn.disabled = true;
      wipeBtn.disabled = true;
      renderRecords();
      restoreEditingDraft(editingDraft);
      apply();
      try {
        await uploadWithConflictRetry(apply);
        deletingKey = '';
        renderRecords();
        restoreEditingDraft(editingDraft);
        renderChart();
      } catch (err) {
        console.error('Error deleting record', err);
        deletingKey = '';
        if (err && err.isReloadPending) return;
        const status = err?.status || err?.result?.error?.code;
        if (status === 401) { handleFatal401(); return; }
        try { await fetchFromDrive(); } catch {}
        renderRecords();
        restoreEditingDraft(editingDraft);
        renderChart();
        alert('Chyba při mazání: ' + describeDriveError(err));
      } finally {
        submitBtn.disabled = false;
        wipeBtn.disabled = false;
      }
    }

    async function saveEdit(key, dtValue, weightValue, noteValue) {
      if (!records[key]) return;
      if (!dtValue) { alert('Vyplňte datum/čas.'); return; }
      const dt = new Date(dtValue);
      if (Number.isNaN(dt.getTime())) { alert('Neplatné datum/čas.'); return; }
      const w = parseFloat(weightValue);
      if (Number.isNaN(w)) { alert('Neplatná hmotnost.'); return; }
      const datetimeIso = dt.toISOString();
      const note = (noteValue || '').trim();
      const originalValue = records[key];
      const original = { datetime: key, ...originalValue };
      // No-op save — typed values match the original record. Skip the
      // upload entirely and silently leave edit mode.
      if (recordMatchesValues(original, datetimeIso, w, note)) {
        editingKey = '';
        renderRecords();
        return;
      }
      if (findDuplicateRecord(datetimeIso, key)) {
        alert(`Záznam s tímto datem a časem již existuje (${formatDateTime(new Date(datetimeIso))}).`);
        return;
      }
      const newKey = toMinuteKey(datetimeIso);
      const updatedValue = { weight: w };
      if (note) updatedValue.note = note;
      const apply = () => {
        if (!records[key]) return false; // original deleted on another device
        // Block if the new datetime is now taken by some other record
        if (findDuplicateRecord(datetimeIso, key)) return false;
        if (newKey !== key) delete records[key];
        records[newKey] = updatedValue;
        editingKey = newKey;
        return true;
      };
      if (newKey !== key) delete records[key];
      records[newKey] = updatedValue;
      editingKey = newKey;
      isSavingEdit = true;
      renderRecords();
      submitBtn.disabled = true;
      wipeBtn.disabled = true;
      try {
        const { success } = await uploadWithConflictRetry(apply);
        isSavingEdit = false;
        if (!success) {
          editingKey = '';
          renderRecords();
          renderChart();
          alert('Záznam byl mezitím změněn z jiného zařízení; změna nebyla uložena.');
          return;
        }
        editingKey = '';
        renderRecords();
        renderChart();
      } catch (err) {
        console.error('Error editing record', err);
        isSavingEdit = false;
        if (err && err.isReloadPending) return;
        const status = err?.status || err?.result?.error?.code;
        if (status === 401) { handleFatal401(); return; }
        try { await fetchFromDrive(); renderRecords(); renderChart(); } catch {}
        const failedLi = historyList.querySelector(`li[data-key="${editingKey}"]`);
        if (failedLi) {
          const fields = failedLi.querySelectorAll('input, textarea');
          if (fields.length >= 3) {
            fields[0].value = dtValue;
            fields[1].value = weightValue;
            fields[2].value = noteValue || '';
            fields[1].focus();
          }
        }
        alert('Chyba při ukládání: ' + describeDriveError(err));
      } finally {
        submitBtn.disabled = false;
        wipeBtn.disabled = false;
      }
    }

    pageSizeSelect.addEventListener('change', () => {
      const next = parseInt(pageSizeSelect.value, 10);
      if (!ALLOWED_PAGE_SIZES.includes(next)) return;
      pageSize = next;
      currentPage = 0;
      renderRecords();
    });

    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        applyRangePreset(btn.dataset.range);
        settings.rangePreset = currentPreset;
        scheduleSettingsSave();
        renderChart();
      });
    });

    rangeFromInput.addEventListener('change', () => {
      currentPreset = null;
      updatePresetButtons();
      renderChart();
    });
    rangeToInput.addEventListener('change', () => {
      currentPreset = null;
      updatePresetButtons();
      renderChart();
    });

    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const theme = btn.dataset.theme;
        if (!ALLOWED_THEMES.includes(theme)) return;
        currentTheme = theme;
        // Store 'light' / 'dark' explicitly; 'system' is the default — drop
        // the key so the file stays minimal and a later device with a
        // different system preference doesn't inherit a stale override.
        if (theme === 'system') {
          delete settings.theme;
        } else {
          settings.theme = theme;
        }
        applyTheme(theme);
        scheduleSettingsSave();
      });
    });

    // Apply the initial theme so the toggle highlights match the system
    // preference before any settings have loaded.
    applyTheme(effectiveTheme());

    function renderChart() {
      // Piggyback the logo display and the new-record form prefill so
      // they stay in sync with the data without an extra hook in every
      // action's success path. Both are idempotent on theme-only
      // re-renders. Runs before the Chart.js bailout so the side
      // effects still happen even if the chart library failed to load.
      updateLogoFromLatest();
      prefillWeightInput();
      if (typeof Chart === 'undefined') return;
      const fromVal = rangeFromInput.value;
      const toVal = rangeToInput.value;
      const fromTs = fromVal ? new Date(fromVal + 'T00:00:00').getTime() : -Infinity;
      const toTs = toVal ? new Date(toVal + 'T23:59:59.999').getTime() : Infinity;

      // recordsAsList() already returns ascending — sort kept defensively
      // in case a bad datetime ever slipped past validation.
      const allPoints = recordsAsList()
        .map(r => ({
          x: typeof r.datetime === 'string' ? new Date(r.datetime).getTime() : NaN,
          y: r.weight,
          note: typeof r.note === 'string' ? r.note : ''
        }))
        .filter(p => !Number.isNaN(p.x) && !Number.isNaN(p.y))
        .sort((a, b) => a.x - b.x);

      const inRange = allPoints.filter(p => p.x >= fromTs && p.x <= toTs);
      let chartPoints = inRange;
      if (inRange.length > 0) {
        let before = null;
        let after = null;
        for (const p of allPoints) {
          if (p.x < fromTs) before = p;
          else if (p.x > toTs) { after = p; break; }
        }
        chartPoints = [
          ...(before ? [before] : []),
          ...inRange,
          ...(after ? [after] : []),
        ];
      }

      if (inRange.length === 0) {
        chartEmptyEl.classList.remove('hidden');
      } else {
        chartEmptyEl.classList.add('hidden');
      }

      const data = {
        datasets: [{
          label: 'Hmotnost (kg)',
          data: chartPoints,
          borderColor: '#16a34a',
          backgroundColor: 'rgba(22, 163, 74, 0.1)',
          tension: 0.2,
          pointRadius: chartPoints.length > 200 ? 0 : 3,
          spanGaps: true,
        }]
      };

      const isDark = document.documentElement.classList.contains('dark');
      const textColor = isDark ? '#e5e7eb' : '#1f2937';
      const gridColor = isDark ? '#374151' : '#e5e7eb';

      if (chart) {
        chart.data = data;
        chart.options.scales.x.min = isFinite(fromTs) ? fromTs : undefined;
        chart.options.scales.x.max = isFinite(toTs) ? toTs : undefined;
        chart.options.scales.x.ticks.color = textColor;
        chart.options.scales.x.grid.color = gridColor;
        chart.options.scales.y.ticks.color = textColor;
        chart.options.scales.y.grid.color = gridColor;
        chart.options.scales.y.title.color = textColor;
        chart.update();
        return;
      }

      chart = new Chart(chartCanvas, {
        type: 'line',
        data,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: (items) => {
                  if (!items || items.length === 0) return '';
                  const ts = items[0].parsed.x;
                  return new Intl.DateTimeFormat(undefined, { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(ts));
                },
                afterBody: (items) => {
                  const note = items?.[0]?.raw?.note;
                  if (!note) return [];
                  const chartWidth = items[0].chart?.width || 400;
                  const usable = Math.max(120, chartWidth - 50);
                  const maxChars = Math.max(15, Math.floor(usable / 7));
                  return wrapTooltipNote(note, maxChars);
                }
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              min: isFinite(fromTs) ? fromTs : undefined,
              max: isFinite(toTs) ? toTs : undefined,
              ticks: {
                color: textColor,
                callback: function (value) {
                  const d = new Date(value);
                  const unit = this._unit;
                  let opts;
                  if (unit === 'year') opts = { year: 'numeric' };
                  else if (unit === 'quarter' || unit === 'month') opts = { month: 'short', year: '2-digit' };
                  else if (unit === 'week' || unit === 'day') opts = { day: 'numeric', month: 'short' };
                  else if (unit === 'hour' || unit === 'minute' || unit === 'second') opts = { hour: 'numeric', minute: '2-digit' };
                  else opts = { day: 'numeric', month: 'short' };
                  return new Intl.DateTimeFormat(undefined, opts).format(d);
                }
              },
              grid: { color: gridColor }
            },
            y: {
              title: { display: true, text: 'kg', color: textColor },
              ticks: { color: textColor },
              grid: { color: gridColor }
            }
          }
        }
      });
    }

    prevPageBtn.addEventListener('click', () => {
      if (currentPage > 0) {
        currentPage--;
        renderRecords();
        }
    });

    nextPageBtn.addEventListener('click', () => {
      currentPage++;
      renderRecords();
    });
  </script>
</body>
</html>
