    <use href="#seg" x="252" y="52"/>
    <use href="#seg" x="277" y="77"  transform="rotate(90 277 77)"/>
    <use href="#seg" x="252" y="102"/>
    <use href="#seg" x="227" y="127" transform="rotate(90 227 127)"/>
    <use href="#seg" x="252" y="152"/>
    
    <!-- DECIMAL POINT -->
    <rect x="288" y="147" width="12" height="12" rx="1" fill="#1DB954"/>
    
    <!-- DIGIT 3: "5" -->
    <use href="#seg" x="336" y="52"/>
    <use href="#seg" x="311" y="77"  transform="rotate(90 311 77)"/>
    <use href="#seg" x="336" y="102"/>
    <use href="#seg" x="361" y="127" transform="rotate(90 361 127)"/>
    <use href="#seg" x="336" y="152"/>
