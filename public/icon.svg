  <!-- Green rounded square IS the scale body -->
  <rect width="512" height="512" rx="80" fill="#1DB954"/>
  
  <!-- ============ DISPLAY UNIT (scaled to 0.78 around its center 256,80) ============ -->
  <g transform="translate(256 80) scale(0.78) translate(-256 -80)">
    <!-- Digits span y=47-157, x=147-366. Display has 16px padding all around. -->
    <rect x="131" y="31" width="250" height="142" rx="18" fill="#ffffff"/>
    
    <!-- DIGIT 1: "7" (y values shifted -10 from previous) -->
    <use href="#seg" x="177" y="52"/>
    <use href="#seg" x="202" y="77"  transform="rotate(90 202 77)"/>
    <use href="#seg" x="202" y="127" transform="rotate(90 202 127)"/>
    
