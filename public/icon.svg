  <!-- ============ FEET (both use the same #foot symbol, right one mirrored) ============
       Foot bbox 92.8×230.8, center (87.88, 134.37)
       Scale (1.56, 1.3): width ~145, height ~300, center (137.1, 174.7)
       Left center (145, 335): translate (7.9, 160.3)
       Right center (367, 335) mirrored: translate_x = 367+137.1 = 504.1 -->
  
  <use href="#foot" transform="translate(7.9, 160.3) scale(1.56, 1.3)"/>
  <use href="#foot" transform="translate(504.1, 160.3) scale(-1.56, 1.3)"/>
</svg>
