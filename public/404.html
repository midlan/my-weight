<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stránka nenalezena – Moje váha</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="stylesheet" href="/tailwind.css" />
  <meta name="theme-color" content="#1DB954" />
  <script>
    // Apply system dark preference synchronously so the first paint matches
    // the user's OS theme. Same one-liner as privacy.html — this is a
    // standalone page, no Drive-stored settings to read.
    (function () {
      try {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen sm:flex sm:items-center sm:justify-center">
  <div class="bg-white dark:bg-gray-900 p-6 w-full min-h-screen sm:max-w-2xl sm:my-6 sm:min-h-0 sm:rounded-lg sm:shadow-lg">
    <h1 class="text-2xl font-bold mb-2">Stránka nenalezena</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">404 — tato adresa v aplikaci Moje váha neexistuje.</p>
    <p><a href="/" class="text-blue-600 dark:text-blue-400 underline">← Zpět do aplikace</a></p>
  </div>
</body>
</html>
